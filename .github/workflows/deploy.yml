name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.example.*"
      - "**/*.example"
  workflow_dispatch:

jobs:
  dispatch:
    name: Deploy Dispatch
    runs-on: [self-hosted, linux, aah]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate LXC inventory identifiers
        run: python3 ops/lxc_inventory.py --check-duplicates

      - name: Run dispatch
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: bash ops/run_dispatch.sh
