name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.example.*"
      - "**/*.example"

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install ansible ansible-lint yamllint

      - name: yamllint
        run: |
          . .venv/bin/activate
          while IFS= read -r -d '' file; do
            printf 'yamllint %s\n' "$file"
            python -c "import pathlib, sys; from yamllint.decoder import detect_encoding; data = pathlib.Path(sys.argv[1]).read_bytes(); encoding = detect_encoding(data); print(f'encoding={encoding} bytes={len(data)} file={sys.argv[1]}'); data.decode(encoding)" "$file"
            yamllint "$file"
          done < <(git ls-files -z '*.yml' '*.yaml')
        working-directory: ansible

      - name: ansible-lint
        run: |
          . .venv/bin/activate
          ansible-lint
        working-directory: ansible

      - name: dispatch dry-run
        run: python3 ops/dispatch.py --dry-run
