name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install ansible ansible-lint yamllint

      - name: yamllint
        run: yamllint .
        working-directory: ansible

      - name: ansible-lint
        run: ansible-lint
        working-directory: ansible

      - name: dispatch dry-run
        run: python3 ops/dispatch.py --dry-run
