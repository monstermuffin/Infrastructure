name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.example.*"
      - "**/*.example"

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install ansible ansible-lint yamllint

      - name: yamllint
        run: |
          . $GITHUB_WORKSPACE/.venv/bin/activate
          while IFS= read -r -d '' file; do
            if python -c "import sys; data=open(sys.argv[1],'rb').read(10); sys.exit(0 if data.startswith(b'\x00GITCRYPT') else 1)" "$file" 2>/dev/null; then
              printf 'skipping git-crypt file: %s\n' "$file"
              continue
            fi
            printf 'yamllint %s\n' "$file"
            yamllint "$file"
          done < <(git ls-files -z '*.yml' '*.yaml')
        working-directory: ansible

      - name: ansible-lint
        run: |
          . $GITHUB_WORKSPACE/.venv/bin/activate
          mkdir -p secrets
          echo "dummy" > secrets/.vault_password
          ansible-lint
        working-directory: ansible

      - name: dispatch dry-run
        run: python3 ops/dispatch.py --dry-run
