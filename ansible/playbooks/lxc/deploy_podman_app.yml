---
# Apps declared in host_vars under `podman_apps` dict.
#
# Target all podman app hosts (requires 'podman_app' tag set in Proxmox):
#   ansible-playbook playbooks/lxc/deploy_podman_app.yml
#
# Target a single host:
#   ansible-playbook playbooks/lxc/deploy_podman_app.yml --limit tag_radarr01
#   ansible-playbook playbooks/lxc/deploy_podman_app.yml --limit radarr01.aah.muffn.io
#
# Deploy - skip Proxmox note:
#   ansible-playbook playbooks/lxc/deploy_podman_app.yml --tags deploy
#
# Pull updated images and restart:
#   ansible-playbook playbooks/lxc/deploy_podman_app.yml --tags image,deploy

- name: Deploy Podman apps
  hosts: "{{ target | default('tag_podman_app') }}"
  become: true
  gather_facts: true
  ignore_unreachable: true

  roles:
    - role: linux/base
      tags:
        - base
        - setup
    - role: podman
      tags:
        - podman
        - install
    - role: apps/podman_app
      tags:
        - app
        - deploy
