---
linux_base_manage_hostname: true
linux_base_hostname: "{{ proxmox_hostname | default(inventory_hostname) }}"
linux_base_hostname_ip: "127.0.1.1"
linux_base_manage_hosts_entry: true

linux_base_manage_timezone: true
linux_base_timezone: "{{ site_timezone | default('Europe/London') }}"

linux_base_manage_dns: true
linux_base_nameservers: "{{ site_nameservers | default([]) }}"
linux_base_search_domains: "{{ site_search_domains | default([]) }}"

linux_base_manage_apt_sources: true

linux_base_packages:
  - bat
  - ca-certificates
  - curl
  - fzf
  - git
  - htop
  - rsync
  - sudo
  - tmux
  - vim
  - ncdu
  - unzip

linux_base_packages_debian_13:
  - eza

linux_base_extra_packages: []
linux_base_igpu_packages:
  - vainfo
linux_base_manage_qemu_guest_agent: false
linux_base_qemu_guest_agent_package: qemu-guest-agent
linux_base_qemu_guest_agent_service: qemu-guest-agent

linux_base_manage_root_authorized_keys: true
linux_base_root_authorized_keys: "{{ root_authorized_keys | default('', true) }}"
linux_base_root_authorized_keys_exclusive: true

linux_base_manage_ansible_user: true
linux_base_ansible_user: ansible
linux_base_ansible_user_groups:
  - "{{ linux_base_admin_group }}"
linux_base_ansible_authorized_keys: "{{ ansible_authorized_keys | default('', true) }}"
linux_base_ansible_authorized_keys_exclusive: true
linux_base_ansible_passwordless_sudo: true

linux_base_manage_admin_user: true
linux_base_admin_user: muffin
linux_base_admin_user_groups:
  - "{{ linux_base_admin_group }}"
linux_base_admin_authorized_keys: "{{ muffin_authorized_keys | default('', true) }}"
linux_base_admin_authorized_keys_exclusive: true
linux_base_admin_passwordless_sudo: true

linux_base_admin_group: >-
  {{ 'wheel' if ansible_os_family in ['RedHat', 'Rocky', 'AlmaLinux', 'Fedora'] else 'sudo' }}

# Podman access creates a 'podman' system group, enables the
# system podman.socket with group-accessible permissions, and adds the admin user to the 'podman' group.
linux_base_manage_podman_access: true

# Podman rootless support sets up /etc/subuid and /etc/subgid so the admin user
# can also run their own rootless containers.
linux_base_podman_rootless: true

# Shell configuration installs zsh, Starship prompt, and deploys .zshrc
linux_base_manage_shell: true
linux_base_shell_clear_motd: true

# Fastfetch installs fastfetch from GitHub releases and deploys system config.
linux_base_manage_fastfetch: true
