---
- name: Gather facts if not already gathered
  ansible.builtin.setup:
  when: ansible_system is not defined
  tags: always

- name: Verify target is Linux
  ansible.builtin.assert:
    that:
      - ansible_system == "Linux"
    fail_msg: "linux/base only supports Linux hosts"
  tags:
    - always

- name: Configure hostname
  ansible.builtin.import_tasks: hostname.yml
  when: linux_base_manage_hostname | bool
  tags:
    - hostname
    - setup

- name: Configure timezone
  ansible.builtin.import_tasks: timezone.yml
  when: linux_base_manage_timezone | bool
  tags:
    - timezone
    - setup

- name: Configure DNS
  ansible.builtin.import_tasks: dns.yml
  when:
    - linux_base_manage_dns | bool
    - linux_base_nameservers | length > 0
  tags:
    - dns
    - setup

- name: Configure apt sources
  ansible.builtin.import_tasks: apt_sources.yml
  when:
    - linux_base_manage_apt_sources | bool
    - ansible_pkg_mgr == "apt"
  tags:
    - apt
    - setup

- name: Install base packages
  ansible.builtin.import_tasks: packages.yml
  tags:
    - packages
    - setup

- name: Configure qemu guest agent
  ansible.builtin.import_tasks: qemu_guest_agent.yml
  when: linux_base_manage_qemu_guest_agent | bool
  tags:
    - packages
    - setup

- name: Configure users
  ansible.builtin.import_tasks: users.yml
  tags:
    - users
    - setup

- name: Configure shell (zsh + Starship)
  ansible.builtin.import_tasks: shell.yml
  when: linux_base_manage_shell | bool
  tags:
    - shell
    - zsh
    - starship
    - setup

- name: Install fastfetch
  ansible.builtin.import_tasks: fastfetch.yml
  when:
    - linux_base_manage_fastfetch | bool
    - ansible_pkg_mgr == "apt"
  tags:
    - fastfetch
    - shell
    - setup
