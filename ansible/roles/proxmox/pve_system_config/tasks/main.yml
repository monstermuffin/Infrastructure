---
- name: Gather facts if not already gathered
  ansible.builtin.setup:
  when: ansible_distribution is not defined

- name: Verify running on Proxmox VE
  ansible.builtin.fail:
    msg: "This role is designed for Proxmox VE systems only"
  when: >
    ansible_distribution != "Debian" or
    not (ansible_distribution_release in ["bullseye", "bookworm", "trixie"])
  tags:
    - always

- name: Include hostname configuration tasks
  ansible.builtin.import_tasks: hostname.yml
  when: pve_system_hostname != ""
  tags:
    - hostname

- name: Include timezone configuration tasks
  ansible.builtin.include_tasks: timezone.yml
  when: pve_system_timezone != ""
  tags:
    - timezone

- name: Include locale configuration tasks
  ansible.builtin.include_tasks: locale.yml
  when: pve_system_locale != ""
  tags:
    - locale

- name: Include DNS configuration tasks
  ansible.builtin.include_tasks: dns.yml
  when: pve_system_nameservers | length > 0
  tags:
    - dns

- name: Include NTP configuration tasks
  ansible.builtin.include_tasks: ntp.yml
  when: pve_system_ntp_enabled | bool
  tags:
    - ntp

- name: Include SSH configuration tasks
  ansible.builtin.include_tasks: ssh.yml
  tags:
    - ssh

- name: Include MOTD configuration tasks
  ansible.builtin.include_tasks: motd.yml
  when: pve_system_motd_enabled | bool
  tags:
    - motd

- name: Include sysctl configuration tasks
  ansible.builtin.include_tasks: sysctl.yml
  when: pve_system_perf_event_paranoid is defined
  tags:
    - sysctl
