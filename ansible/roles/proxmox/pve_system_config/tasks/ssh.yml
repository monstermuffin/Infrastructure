---
- name: Configure SSH server settings
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  loop:
    - regexp: "^#?Port "
      line: "Port {{ pve_system_ssh_port }}"
    - regexp: "^#?PermitRootLogin "
      line: "PermitRootLogin {{ pve_system_ssh_permit_root_login }}"
    - regexp: "^#?PasswordAuthentication "
      line: "PasswordAuthentication {{ 'yes' if pve_system_ssh_password_authentication else 'no' }}"
  notify: Restart sshd

- name: Import SSH public keys from URL
  when: pve_system_ssh_import_keys_url != ""
  tags:
    - ssh-keys
  block:
    - name: Download SSH public keys from {{ pve_system_ssh_import_keys_url }}
      ansible.builtin.uri:
        url: "{{ pve_system_ssh_import_keys_url }}"
        return_content: true
        timeout: 10
      register: ssh_keys_download
      changed_when: false

    - name: Ensure .ssh directory exists for {{ pve_system_ssh_import_keys_user }}
      ansible.builtin.file:
        path: "~{{ pve_system_ssh_import_keys_user }}/.ssh"
        state: directory
        owner: "{{ pve_system_ssh_import_keys_user }}"
        group: "{{ pve_system_ssh_import_keys_user }}"
        mode: "0700"

    - name: Add downloaded SSH keys to authorized_keys
      ansible.builtin.lineinfile:
        path: "~{{ pve_system_ssh_import_keys_user }}/.ssh/authorized_keys"
        line: "{{ item }}"
        state: present
        create: true
        owner: "{{ pve_system_ssh_import_keys_user }}"
        group: "{{ pve_system_ssh_import_keys_user }}"
        mode: "0600"
      loop: "{{ ssh_keys_download.content.strip().split('\n') }}"
      when: item | length > 0

- name: Ensure SSH service is enabled and running
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started
