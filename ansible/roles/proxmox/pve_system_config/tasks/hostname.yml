---
# Proxmox requires the FQDN to resolve to the node's real IP (typically
# the corosync ring address), NOT 127.0.1.1 — loopback breaks cluster
# communication and migrations.

- name: Assert pve_system_hosts_ip is set
  ansible.builtin.assert:
    that: pve_system_hosts_ip != ""
    fail_msg: >-
      pve_system_hosts_ip is not set for {{ inventory_hostname }}.
      This must be the node's real management IP — writing /etc/hosts without it
      will break the Proxmox web UI. Set it in host_vars/{{ inventory_hostname }}.yml.

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ pve_system_hostname }}"

- name: Build /etc/hosts from template
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
    backup: true
