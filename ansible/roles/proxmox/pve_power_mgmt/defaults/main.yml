---
pve_power_mgmt_enabled: false

# --- CPU frequency scaling ---
# Options: performance, powersave, ondemand, conservative, schedutil, "" = skip
pve_power_mgmt_cpu_governor: "powersave"
# Energy Performance Preference (Intel HWP / AMD CPPC CPUs only, skipped silently if unsupported)
# Options: default, performance, balance_performance, balance_power, power, "" = skip
pve_power_mgmt_cpu_epp: "balance_power"
# Persist governor and EPP via systemd oneshot service (pve-power-cpu.service)
pve_power_mgmt_cpu_persistent: true

# --- Wake-on-LAN ---
# Disabling WoL on inactive/disconnected NICs saves ~0.5-1W per port.
# Only affects wake-from-poweroff behaviour and has NO effect on a running link.
# New NICs added later are unaffected until the playbook is re-run.
pve_power_mgmt_wol_disable: false
# Interfaces to keep WoL enabled on (e.g. management NIC for remote wakeup)
pve_power_mgmt_wol_keep_interfaces: []
# Explicit interface list to manage; empty = auto-discover all WoL-capable ethernet interfaces
pve_power_mgmt_wol_interfaces: []

# --- USB autosuspend ---
pve_power_mgmt_usb_autosuspend: true
# Delay before a USB device is suspended (milliseconds)
pve_power_mgmt_usb_autosuspend_delay_ms: 2000
