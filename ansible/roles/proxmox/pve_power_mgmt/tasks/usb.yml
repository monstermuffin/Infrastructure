---
- name: Apply USB autosuspend to all current USB devices
  ansible.builtin.shell: |
    set -o pipefail
    changed=0
    for dev in /sys/bus/usb/devices/*/; do
      ctrl="$dev/power/control"
      delay="$dev/power/autosuspend_delay_ms"
      [ -f "$ctrl" ] || continue

      current_ctrl=$(cat "$ctrl" 2>/dev/null)
      if [ "$current_ctrl" != "auto" ]; then
        echo "auto" > "$ctrl" && changed=$((changed + 1))
      fi

      [ -f "$delay" ] || continue
      current_delay=$(cat "$delay" 2>/dev/null)
      if [ "$current_delay" != "{{ pve_power_mgmt_usb_autosuspend_delay_ms }}" ]; then
        echo "{{ pve_power_mgmt_usb_autosuspend_delay_ms }}" > "$delay" && changed=$((changed + 1))
      fi
    done
    echo "changed_count=$changed"
  args:
    executable: /bin/bash
  register: _usb_result
  changed_when: "'changed_count=0' not in _usb_result.stdout"

- name: Write USB autosuspend udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/82-pve-usb-pm.rules
    content: |
      # Managed by Ansible pve_power_mgmt role — do not edit manually
      ACTION=="add", SUBSYSTEM=="usb", TEST=="power/control", ATTR{power/control}="auto"
      ACTION=="add", SUBSYSTEM=="usb", TEST=="power/autosuspend_delay_ms", ATTR{power/autosuspend_delay_ms}="{{ pve_power_mgmt_usb_autosuspend_delay_ms }}"
    mode: "0644"
  notify: Reload udev rules
