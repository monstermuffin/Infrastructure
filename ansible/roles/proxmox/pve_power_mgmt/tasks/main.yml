---
- name: Gather facts if not already gathered
  ansible.builtin.setup:
  when: ansible_distribution is not defined

- name: Verify running on Proxmox VE
  ansible.builtin.fail:
    msg: "This role is designed for Proxmox VE systems only"
  when: >
    ansible_distribution != "Debian" or
    not (ansible_distribution_release in ["bullseye", "bookworm", "trixie"])
  tags: always

- name: Show current power state
  ansible.builtin.include_tasks: info.yml
  tags:
    - info
    - power_info

- name: Apply power management settings
  when: pve_power_mgmt_enabled | bool
  tags:
    - apply
    - power_apply
  block:
    - name: Configure CPU governor and EPP
      ansible.builtin.include_tasks: cpu.yml
      when: >
        (pve_power_mgmt_cpu_governor | length > 0) or
        (pve_power_mgmt_cpu_epp | length > 0)
      tags:
        - cpu
        - governor
        - epp

    - name: Configure Wake-on-LAN
      ansible.builtin.include_tasks: wol.yml
      when: pve_power_mgmt_wol_disable | bool
      tags:
        - wol

    - name: Configure USB autosuspend
      ansible.builtin.include_tasks: usb.yml
      when: pve_power_mgmt_usb_autosuspend | bool
      tags:
        - usb

- name: Revert power management settings
  ansible.builtin.include_tasks: revert.yml
  when:
    - pve_power_mgmt_enabled | bool
  tags:
    - revert
    - never
