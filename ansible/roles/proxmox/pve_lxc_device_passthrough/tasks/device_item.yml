---
- name: Validate device configuration
  ansible.builtin.assert:
    that:
      - device.type is defined
      - device.type in ['device', 'usb']
    fail_msg: "Invalid device type: {{ device.type | default('undefined') }}. Must be 'device' or 'usb'"
    quiet: true

- name: Determine device slot
  ansible.builtin.set_fact:
    _device_slot: "{{ device.slot | default(device_idx) }}"

- name: Configure character device passthrough
  when: device.type == "device"
  block:
    - name: Validate character device path
      ansible.builtin.assert:
        that:
          - device.path is defined
          - device.path | length > 0
        fail_msg: "Character device requires 'path' parameter"
        quiet: true

    - name: Check if device exists on host - {{ device.path }}
      ansible.builtin.stat:
        path: "{{ device.path }}"
      register: _device_stat
      delegate_to: "{{ pve_lxc_proxmox_node }}"
      when: pve_lxc_device_validate | bool

    - name: Fail if device does not exist on host
      ansible.builtin.fail:
        msg: "Device {{ device.path }} does not exist on {{ pve_lxc_proxmox_node }}"
      when:
        - pve_lxc_device_validate | bool
        - not _device_stat.stat.exists

    - name: Check current device passthrough configuration
      ansible.builtin.shell:
        cmd: "set -o pipefail && pct config {{ pve_lxc_vmid }} | grep -E '^dev{{ _device_slot }}:' || true"
      register: _pve_current_dev
      changed_when: false
      delegate_to: "{{ pve_lxc_proxmox_node }}"

    - name: Build device passthrough config string
      ansible.builtin.set_fact:
        _device_config: "{{ device.path }}{{ ',gid=' + (device.gid | string) if device.gid is defined else '' }}"

    - name: Configure device passthrough - dev{{ _device_slot }}
      ansible.builtin.command:
        cmd: "pct set {{ pve_lxc_vmid }} --dev{{ _device_slot }} {{ _device_config }}"
      when: _device_config not in _pve_current_dev.stdout
      delegate_to: "{{ pve_lxc_proxmox_node }}"
      changed_when: true

- name: Configure USB device passthrough
  when: device.type == "usb"
  block:
    - name: Validate USB device configuration
      ansible.builtin.assert:
        that:
          - device.vid_pid is defined
          - device.vid_pid | length > 0
          - device.vid_pid is regex('^[0-9a-fA-F]{4}:[0-9a-fA-F]{4}$')
        fail_msg: "USB device requires 'vid_pid' in format 'XXXX:XXXX' (e.g., '1a6e:089a')"
        quiet: true

    - name: Check if USB device is connected to host
      ansible.builtin.shell:
        cmd: "set -o pipefail && lsusb | grep -i '{{ device.vid_pid }}' || true"
      register: _usb_check
      changed_when: false
      delegate_to: "{{ pve_lxc_proxmox_node }}"
      when: pve_lxc_device_validate | bool

    - name: Warn if USB device not found on host
      ansible.builtin.debug:
        msg: "WARNING: USB device {{ device.vid_pid }} not currently connected to {{ pve_lxc_proxmox_node }}"
      when:
        - pve_lxc_device_validate | bool
        - _usb_check.stdout | length == 0

    - name: Check current USB passthrough configuration
      ansible.builtin.shell:
        cmd: "set -o pipefail && pct config {{ pve_lxc_vmid }} | grep -E '^usb{{ _device_slot }}:' || true"
      register: _pve_current_usb
      changed_when: false
      delegate_to: "{{ pve_lxc_proxmox_node }}"

    - name: Build USB passthrough config string
      ansible.builtin.set_fact:
        _usb_config: "host={{ device.vid_pid }}{{ ',usb3=1' if (device.usb3 | default(false)) else '' }}"

    - name: Configure USB passthrough - usb{{ _device_slot }}
      ansible.builtin.command:
        cmd: "pct set {{ pve_lxc_vmid }} --usb{{ _device_slot }} {{ _usb_config }}"
      when: _usb_config not in _pve_current_usb.stdout
      delegate_to: "{{ pve_lxc_proxmox_node }}"
      changed_when: true
