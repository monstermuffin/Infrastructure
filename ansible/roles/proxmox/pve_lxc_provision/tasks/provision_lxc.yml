---
# Uses pct CLI instead of community.proxmox module, feature flags, mounts,
# and cross-node API proxying all require root@pam; pct avoids this.

- name: "Set container facts — {{ lxc_item.key }}"
  ansible.builtin.set_fact:
    _lxc: "{{ lxc_item.value }}"
    _lxc_name: "{{ lxc_item.key }}"

- name: "Check if container already exists in cluster — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: pvesh get /cluster/resources --type vm --output-format json
  register: _cluster_resources
  changed_when: false

- name: "Determine current container location — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_existing: >-
      {{
        (_cluster_resources.stdout | from_json)
        | selectattr('type', 'equalto', 'lxc')
        | selectattr('vmid', 'equalto', (_lxc.vmid | int))
        | list
      }}

- name: "Set target node fact — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_current_node: "{{ _lxc_existing[0].node if (_lxc_existing | length) > 0 else _lxc.node }}"
    _lxc_exists: "{{ (_lxc_existing | length) > 0 }}"

- name: "Set delegate host for container operations — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_delegate_host: >-
      {{ _lxc_current_node ~ '.' ~ pve_cluster_domain if pve_cluster_domain else inventory_hostname }}

- name: "Build features string — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_features: >-
      nesting={{ '1' if _lxc.features.nesting | default(true) else '0'
      }}{{- ',keyctl=1' if _lxc.features.keyctl | default(false) else ''
      }}{{- ',fuse=1' if _lxc.features.fuse | default(false) else '' }}

- name: "Build effective DNS settings — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_effective_nameserver: "{{ _lxc.nameserver | default(pve_lxc_default_nameserver) }}"
    _lxc_effective_searchdomain: "{{ _lxc.searchdomain | default(pve_lxc_default_searchdomain) }}"

- name: "Normalize desired disk size — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_desired_disk_gb: "{{ _lxc.disk | default(pve_lxc_default_disk) | regex_replace('[^0-9]', '') | int }}"

- name: "Initialize bind mount args — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_bind_mounts: {}

- name: "Build bind mount args — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_bind_mounts: >-
      {{
        _lxc_bind_mounts | combine({
          'mp' ~ idx: item.host_path ~ ',mp=' ~ item.lxc_path
            ~ (',shared=1' if item.shared | default(false) else '')
            ~ (',readonly=1' if item.readonly | default(false) else '')
            ~ ',replicate=0'
        })
      }}
  loop: "{{ _lxc.bind_mounts | default([]) }}"
  loop_control:
    index_var: idx

- name: "Initialize device passthrough args — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_devices: {}

- name: "Build device passthrough args — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_devices: >-
      {{
        _lxc_devices | combine({
          'dev' ~ idx: item.path
            ~ (',mode=' ~ item.mode if item.mode is defined else '')
            ~ (',gid=' ~ item.gid if item.gid is defined else '')
            ~ (',uid=' ~ item.uid if item.uid is defined else '')
            ~ (',deny-write=1' if item.deny_write | default(false) else '')
        })
      }}
  loop: "{{ _lxc.devices | default([]) }}"
  loop_control:
    index_var: idx

- name: "Ensure SSH keys exist on target node — {{ _lxc_name }}"
  become: true
  ansible.builtin.copy:
    content: ""
    dest: /tmp/ansible_lxc_ssh_keys.pub
    mode: "0644"
  delegate_to: "{{ _lxc_delegate_host }}"
  when:
    - not _lxc_exists
    - _lxc_delegate_host != inventory_hostname

- name: "Write bootstrap SSH public keys to target node — {{ _lxc_name }}"
  become: true
  ansible.builtin.lineinfile:
    path: /tmp/ansible_lxc_ssh_keys.pub
    line: "{{ item }}"
    insertafter: EOF
  loop: "{{ _ssh_keys }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  when:
    - not _lxc_exists
    - _lxc_delegate_host != inventory_hostname

- name: "Parse ostemplate storage and filename — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_template_storage: "{{ (_lxc.ostemplate | default(pve_lxc_default_ostemplate)).split(':')[0] }}"
    _lxc_template_file: "{{ (_lxc.ostemplate | default(pve_lxc_default_ostemplate)).split('/')[-1] }}"
  when: not _lxc_exists

- name: "Check if ostemplate is cached on target node — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pveam list {{ _lxc_template_storage }}"
  register: _pveam_list
  changed_when: false
  delegate_to: "{{ _lxc_delegate_host }}"
  when: not _lxc_exists

- name: "Download ostemplate if not cached — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pveam download {{ _lxc_template_storage }} {{ _lxc_template_file }}"
  register: _pveam_download
  changed_when: true
  delegate_to: "{{ _lxc_delegate_host }}"
  when:
    - not _lxc_exists
    - _lxc_template_file not in (_pveam_list.stdout | default(''))

- name: "Create LXC container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: >-
      pct create {{ _lxc.vmid }}
      {{ _lxc.ostemplate | default(pve_lxc_default_ostemplate) }}
      --hostname {{ _lxc.hostname }}
      --storage {{ _lxc.storage | default(pve_lxc_default_storage) }}
      --rootfs {{ _lxc.storage | default(pve_lxc_default_storage) }}:{{
        _lxc.disk | default(pve_lxc_default_disk) | regex_replace('[^0-9]', '') }}
      --cores {{ _lxc.cores | default(pve_lxc_default_cores) }}
      --memory {{ _lxc.memory | default(pve_lxc_default_memory) }}
      --swap {{ _lxc.swap | default(pve_lxc_default_swap) }}
      --unprivileged {{ '1' if _lxc.unprivileged | default(pve_lxc_default_unprivileged) else '0' }}
      --onboot {{ '1' if _lxc.onboot | default(pve_lxc_default_onboot) else '0' }}
      --net0 name=eth0,bridge={{
        _lxc.network_bridge | default(pve_lxc_default_network_bridge)
      }},ip={{ _lxc.network_ip | default('dhcp') }}{{
        ',gw=' ~ _lxc.network_gw if _lxc.network_ip is defined else '' }}{{
        ',tag=' ~ _lxc.network_vlan if _lxc.network_vlan is defined else '' }}
      --features {{ _lxc_features | trim }}
      {{ '--nameserver ' ~ (_lxc_effective_nameserver | quote) if _lxc_effective_nameserver | length > 0 else '' }}
      {{ '--searchdomain ' ~ (_lxc_effective_searchdomain | quote) if _lxc_effective_searchdomain | length > 0 else '' }}
      --ssh-public-keys /tmp/ansible_lxc_ssh_keys.pub
      --tags {{ (_lxc.tags | default([]) + [_lxc_name]) | join(';') }}
      {% for mp_key, mp_val in _lxc_bind_mounts.items() %}
      --{{ mp_key }} {{ mp_val }}
      {% endfor %}
      {% for dev_key, dev_val in _lxc_devices.items() %}
      --{{ dev_key }} {{ dev_val }}
      {% endfor %}
  delegate_to: "{{ _lxc_delegate_host }}"
  when: not _lxc_exists
  register: _lxc_create
  changed_when: _lxc_create is not skipped

- name: "Read current container config — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh get /nodes/{{ _lxc_current_node }}/lxc/{{ _lxc.vmid }}/config --output-format json"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_current_config_raw
  changed_when: false
  when: _lxc_exists

- name: "Determine if container specs need updating — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_needs_update: >-
      {{
        _lxc_exists and (
          (_lxc_cfg.hostname | default('')) != _lxc.hostname or
          (_lxc_cfg.cores | default(0) | int) != (_lxc.cores | default(pve_lxc_default_cores) | int) or
          (_lxc_cfg.memory | default(0) | int) != (_lxc.memory | default(pve_lxc_default_memory) | int) or
          (_lxc_cfg.swap | default(0) | int) != (_lxc.swap | default(pve_lxc_default_swap) | int) or
          (_lxc_cfg.onboot | default(0) | int) != (1 if _lxc.onboot | default(pve_lxc_default_onboot) else 0) or
          (_lxc_cfg.nameserver | default('')) != _lxc_effective_nameserver or
          (_lxc_cfg.searchdomain | default('')) != _lxc_effective_searchdomain or
          (_lxc_cfg.features | default('')) != (_lxc_features | trim) or
          ((_lxc_cfg.tags | default('')).split(';') | sort) != ((_lxc.tags | default([]) + [_lxc_name]) | sort)
        )
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Read current disk size — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_current_disk_gb_raw: >-
      {{
        ((_lxc_cfg.rootfs | default(''))
        | regex_search('(?:^|,)size=([0-9]+)G(?:,|$)', '\1') or [])
        | first | default('')
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Determine if disk needs resizing — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_current_disk_gb: "{{ (_lxc_current_disk_gb_raw | default('0')) | int }}"
    _lxc_disk_needs_resize: >-
      {{
        _lxc_exists and
        (_lxc_current_disk_gb_raw | default('') | length > 0) and
        ((_lxc_current_disk_gb_raw | int) < (_lxc_desired_disk_gb | int))
      }}
    _lxc_disk_resize_delta_gb: >-
      {{
        (_lxc_desired_disk_gb | int) - ((_lxc_current_disk_gb_raw | default('0')) | int)
      }}
  when: _lxc_exists

- name: "Determine if DNS needs updating — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_dns_needs_update: >-
      {{
        _lxc_exists and (
          (_lxc_cfg.nameserver | default('')) != _lxc_effective_nameserver or
          (_lxc_cfg.searchdomain | default('')) != _lxc_effective_searchdomain
        )
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Determine if net0 needs updating — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_net0_needs_update: >-
      {{
        _lxc_exists and (
          (((_lxc_cfg.net0 | default('')) | regex_search('(?:^|,)bridge=([^,]+)', '\1') or []) | first | default(''))
            != (_lxc.network_bridge | default(pve_lxc_default_network_bridge)) or
          (((_lxc_cfg.net0 | default('')) | regex_search('(?:^|,)ip=([^,]+)', '\1') or []) | first | default(''))
            != (_lxc.network_ip | default('dhcp')) or
          (((_lxc_cfg.net0 | default('')) | regex_search('(?:^|,)gw=([^,]+)', '\1') or []) | first | default(''))
            != (_lxc.network_gw | default('')) or
          (((_lxc_cfg.net0 | default('')) | regex_search('(?:^|,)tag=([^,]+)', '\1') or []) | first | default('') | string)
            != (_lxc.network_vlan | default('') | string)
        )
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Determine if bind mounts need updating — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_mounts_need_update: >-
      {{
        _lxc_exists and _lxc_bind_mounts | length > 0 and (
          (_lxc_bind_mounts.items() | list | difference(
            (_lxc_cfg | dict2items
              | selectattr('key', 'match', '^mp[0-9]+$')
              | items2dict).items() | list
          )) | length > 0
        )
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Determine if device passthrough needs updating — {{ _lxc_name }}"
  ansible.builtin.set_fact:
    _lxc_devices_need_update: >-
      {{
        _lxc_exists and _lxc_devices | length > 0 and (
          (_lxc_devices.items() | list | difference(
            (_lxc_cfg | dict2items
              | selectattr('key', 'match', '^dev[0-9]+$')
              | items2dict).items() | list
          )) | length > 0
        )
      }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  when: _lxc_exists

- name: "Check if HA resource exists — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh get /cluster/ha/resources/ct:{{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_ha_check
  changed_when: false
  failed_when: false
  when: _lxc.ha.enabled | default(false) | bool

- name: "Update existing LXC container specs — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: >-
      pct set {{ _lxc.vmid }}
      --hostname {{ _lxc.hostname }}
      --cores {{ _lxc.cores | default(pve_lxc_default_cores) }}
      --memory {{ _lxc.memory | default(pve_lxc_default_memory) }}
      --swap {{ _lxc.swap | default(pve_lxc_default_swap) }}
      --onboot {{ '1' if _lxc.onboot | default(pve_lxc_default_onboot) else '0' }}
      {{
        '--nameserver ' ~ (_lxc_effective_nameserver | quote)
        if _lxc_effective_nameserver | length > 0 else
        ('--delete nameserver' if (_lxc_cfg.nameserver | default('') | length > 0) else '')
      }}
      {{
        '--searchdomain ' ~ (_lxc_effective_searchdomain | quote)
        if _lxc_effective_searchdomain | length > 0 else
        ('--delete searchdomain' if (_lxc_cfg.searchdomain | default('') | length > 0) else '')
      }}
      --features {{ _lxc_features | trim }}
      --tags {{ (_lxc.tags | default([]) + [_lxc_name]) | join(';') }}
  vars:
    _lxc_cfg: "{{ (_lxc_current_config_raw.stdout | default('{}')) | from_json }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  when: _lxc_exists and (_lxc_needs_update | default(false) | bool)
  register: _lxc_update
  changed_when: _lxc_update is not skipped

- name: "Grow rootfs disk — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct resize {{ _lxc.vmid }} rootfs +{{ _lxc_disk_resize_delta_gb }}G"
  delegate_to: "{{ _lxc_delegate_host }}"
  when: _lxc_exists and (_lxc_disk_needs_resize | default(false) | bool)
  register: _lxc_disk_resize
  changed_when: _lxc_disk_resize is not skipped

# For HA CTs, tell force HA to be stopped to allow following updates - not sure if this is strictly necessary needed? idk
- name: "Set HA desired state to stopped before network update — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh set /cluster/ha/resources/ct:{{ _lxc.vmid }} --state stopped"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: >-
    _lxc_exists and
    (
      (_lxc_net0_needs_update | default(false) | bool) or
      (_lxc_dns_needs_update | default(false) | bool)
    ) and
    (_lxc.ha.enabled | default(false) | bool) and
    (_lxc_ha_check.rc | default(1) == 0)

- name: "Shutdown container to apply network update (non-HA) — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct shutdown {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_shutdown_for_net
  changed_when: _lxc_shutdown_for_net.rc == 0
  failed_when: >-
    _lxc_shutdown_for_net.rc != 0 and
    'not running' not in (_lxc_shutdown_for_net.stderr | default('')) and
    'already stopped' not in (_lxc_shutdown_for_net.stderr | default(''))
  when: >-
    _lxc_exists and
    not (_lxc.ha.enabled | default(false) | bool) and (
      (_lxc_net0_needs_update | default(false) | bool) or
      (_lxc_dns_needs_update | default(false) | bool)
    )

- name: "Wait for HA to stop container for network update — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct status {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_status_net
  until: "'status: stopped' in _lxc_status_net.stdout"
  retries: 30
  delay: 5
  changed_when: false
  when: >-
    _lxc_exists and
    (_lxc.ha.enabled | default(false) | bool) and
    (_lxc_ha_check.rc | default(1) == 0) and (
      (_lxc_net0_needs_update | default(false) | bool) or
      (_lxc_dns_needs_update | default(false) | bool)
    )

- name: "Update net0 — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: >-
      pct set {{ _lxc.vmid }}
      --net0 name=eth0,bridge={{ _lxc.network_bridge | default(pve_lxc_default_network_bridge) }},ip={{ _lxc.network_ip | default('dhcp') }}{{
        ',gw=' ~ _lxc.network_gw if _lxc.network_ip is defined else '' }}{{ ',tag=' ~ _lxc.network_vlan if _lxc.network_vlan is defined else '' }}
  delegate_to: "{{ _lxc_delegate_host }}"
  when: _lxc_exists and (_lxc_net0_needs_update | default(false) | bool)
  register: _lxc_net0_update
  changed_when: _lxc_net0_update is not skipped

- name: "Set HA desired state to stopped before mount update — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh set /cluster/ha/resources/ct:{{ _lxc.vmid }} --state stopped"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: >-
    _lxc_exists and
    (_lxc_mounts_need_update | default(false) | bool) and
    (_lxc.ha.enabled | default(false) | bool) and
    (_lxc_ha_check.rc | default(1) == 0)

- name: "Shutdown container to apply bind mount update (non-HA) — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct shutdown {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_shutdown_for_mounts
  changed_when: _lxc_shutdown_for_mounts.rc == 0
  failed_when: >-
    _lxc_shutdown_for_mounts.rc != 0 and
    'not running' not in (_lxc_shutdown_for_mounts.stderr | default('')) and
    'already stopped' not in (_lxc_shutdown_for_mounts.stderr | default(''))
  when: >-
    _lxc_exists and
    not (_lxc.ha.enabled | default(false) | bool) and
    (_lxc_mounts_need_update | default(false) | bool)

- name: "Wait for HA to stop container for bind mount update — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct status {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_status_mounts
  until: "'status: stopped' in _lxc_status_mounts.stdout"
  retries: 30
  delay: 5
  changed_when: false
  when: >-
    _lxc_exists and
    (_lxc.ha.enabled | default(false) | bool) and
    (_lxc_ha_check.rc | default(1) == 0) and
    (_lxc_mounts_need_update | default(false) | bool)

- name: "Update bind mounts — {{ _lxc_name }}"
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/pve/nodes/{{ _lxc_current_node }}/lxc/{{ _lxc.vmid }}.conf"
    regexp: "^{{ item.key }}:"
    line: "{{ item.key }}: {{ item.value }}"
  loop: "{{ _lxc_bind_mounts | dict2items }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  when: _lxc_exists and (_lxc_mounts_need_update | default(false) | bool)

# Device passthrough (dev[n]) can be set without stopping the container, LXC restart needed to show tho
- name: "Update device passthrough — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: >-
      pct set {{ _lxc.vmid }}
      {% for dev_key, dev_val in _lxc_devices.items() %}
      --{{ dev_key }} {{ dev_val }}
      {% endfor %}
  delegate_to: "{{ _lxc_delegate_host }}"
  when: _lxc_exists and (_lxc_devices_need_update | default(false) | bool)
  register: _lxc_devices_update
  changed_when: _lxc_devices_update is not skipped

# Non-HA containers: start directly with pct.
# HA containers: restore the desired state so HA starts them using pct start
- name: "Start container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct start {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_start
  changed_when: _lxc_start.rc == 0
  failed_when: _lxc_start.rc != 0 and 'already running' not in (_lxc_start.stderr | default(''))
  when: _lxc.start | default(true) and not (_lxc.ha.enabled | default(false) | bool)

- name: "Register LXC for guest bootstrap — {{ _lxc_name }}"
  ansible.builtin.add_host:
    name: "{{ _lxc.hostname | default(_lxc_name) }}"
    groups: "{{ ['lxc_bootstrap_targets'] + group_names }}"
    ansible_host: >-
      {{
        ((_lxc.network_ip | default('')) | regex_replace('/.*', ''))
        if (_lxc.network_ip | default('dhcp')) != 'dhcp'
        else (_lxc.hostname | default(_lxc_name))
      }}
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Check if HA resource exists — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh get /cluster/ha/resources/ct:{{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_ha_check
  changed_when: false
  failed_when: false
  when: _lxc.ha.enabled | default(false) | bool

- name: "Register container in HA — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: >-
      pvesh create /cluster/ha/resources
      --sid ct:{{ _lxc.vmid }}
      --state {{ _lxc.ha.state | default(pve_lxc_ha_default_state) }}
      --max_restart {{ _lxc.ha.max_restart | default(pve_lxc_ha_default_max_restart) }}
      --max_relocate {{ _lxc.ha.max_relocate | default(pve_lxc_ha_default_max_relocate) }}
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: true
  when:
    - _lxc.ha.enabled | default(false) | bool
    - _lxc_ha_check.rc | default(1) != 0

- name: "Restore HA desired state to started — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pvesh set /cluster/ha/resources/ct:{{ _lxc.vmid }} --state {{ _lxc.ha.state | default(pve_lxc_ha_default_state) }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when:
    - _lxc.start | default(true)
    - _lxc.ha.enabled | default(false) | bool
    - _lxc_ha_check.rc | default(1) == 0

- name: "Wait for container to be running for bootstrap key sync — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct status {{ _lxc.vmid }}"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_status_running
  until: "'status: running' in _lxc_status_running.stdout"
  retries: 30
  delay: 5
  changed_when: false
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Ensure root SSH directory exists in container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct exec {{ _lxc.vmid }} -- install -d -m 700 /root/.ssh"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Ensure root SSH path ownership is correct in container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct exec {{ _lxc.vmid }} -- chown root:root /root /root/.ssh"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Push bootstrap SSH public keys into container temp path — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct push {{ _lxc.vmid }} /tmp/ansible_lxc_ssh_keys.pub /tmp/ansible_lxc_ssh_keys.pub --perms 0600"
  delegate_to: "{{ _lxc_delegate_host }}"
  register: _lxc_push_bootstrap_keys
  changed_when: _lxc_push_bootstrap_keys.rc == 0
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Install bootstrap SSH public keys for root in container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct exec {{ _lxc.vmid }} -- install -o root -g root -m 600 /tmp/ansible_lxc_ssh_keys.pub /root/.ssh/authorized_keys"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Remove temp bootstrap SSH key file from container — {{ _lxc_name }}"
  become: true
  ansible.builtin.command:
    cmd: "pct exec {{ _lxc.vmid }} -- rm -f /tmp/ansible_lxc_ssh_keys.pub"
  delegate_to: "{{ _lxc_delegate_host }}"
  changed_when: false
  when: not _lxc_exists and _lxc.start | default(true)

- name: "Display provisioning result — {{ _lxc_name }}"
  ansible.builtin.debug:
    msg: >-
      Container {{ _lxc_name }} (VMID {{ _lxc.vmid }}) —
      {{ 'created' if not _lxc_exists else 'updated' }}
      on node {{ _lxc_current_node }}
