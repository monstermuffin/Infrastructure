---
- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ pve_cifs_credentials_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Determine unique NAS sources from mount definitions
  ansible.builtin.set_fact:
    _cifs_unique_sources: "{{ pve_cifs_mounts | map(attribute='source') | unique | list }}"

- name: Write credential files
  ansible.builtin.template:
    src: cifs.cred.j2
    dest: "{{ pve_cifs_credentials_dir }}/{{ item }}.cred"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ _cifs_unique_sources }}"
  loop_control:
    label: "{{ pve_cifs_credentials_dir }}/{{ item }}.cred"
  no_log: true
