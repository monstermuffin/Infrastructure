---
- name: Gather facts if not already gathered
  ansible.builtin.setup:
  when: ansible_distribution is not defined

- name: Verify running on Proxmox VE
  ansible.builtin.fail:
    msg: "This role is designed for Proxmox VE systems only"
  when: >
    ansible_distribution != "Debian" or
    not (ansible_distribution_release in ["bullseye", "bookworm", "trixie"])
  tags:
    - always

- name: Validate CIFS mount configuration
  ansible.builtin.assert:
    that:
      - pve_cifs_enabled | bool
    fail_msg: "pve_cifs_enabled must be set to true"
  tags:
    - always

- name: Validate mount sources exist
  ansible.builtin.assert:
    that:
      - item.source in pve_cifs_sources
    fail_msg: "Mount '{{ item.name }}' references unknown source '{{ item.source }}' — check pve_cifs_sources"
  loop: "{{ pve_cifs_mounts }}"
  loop_control:
    label: "{{ item.name }}"
  tags:
    - always

- name: Include status tasks
  ansible.builtin.include_tasks: status.yml
  tags:
    - info
    - status

- name: Include install tasks
  ansible.builtin.include_tasks: install.yml
  when: pve_cifs_install_utils | bool
  tags:
    - install
    - packages

- name: Include credential tasks
  ansible.builtin.include_tasks: credentials.yml
  when: pve_cifs_mounts | length > 0
  tags:
    - credentials
    - creds

- name: Include mount tasks
  ansible.builtin.include_tasks: mounts.yml
  when: pve_cifs_mounts | length > 0
  tags:
    - mount
    - configure

- name: Include removal tasks
  ansible.builtin.include_tasks: remove.yml
  when: pve_cifs_mounts | length > 0
  tags:
    - never
    - remove
    - absent
    - unmount
