---
- name: Find legacy .list repository files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d/
    patterns: "pve-*.list,ceph-*.list"
  register: legacy_repo_files

- name: Rename legacy .list files to .bak (preserve them)
  ansible.builtin.command:
    cmd: "mv {{ item.path }} {{ item.path }}.bak"
    creates: "{{ item.path }}.bak"
  loop: "{{ legacy_repo_files.files }}"
  when: legacy_repo_files.files is defined

- name: Find .sources repository files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d/
    patterns: "pve-*.sources,ceph*.sources"
  register: sources_repo_files

- name: Disable existing .sources files (set Enabled=false)
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^Enabled:'
    line: 'Enabled: false'
    state: present
  loop: "{{ sources_repo_files.files }}"
  when:
    - sources_repo_files.files is defined
    - not (pve_enterprise_repo_enabled | bool)

- name: Remove proxmox entries from main sources.list
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '^\s*deb.*proxmox\.com'
    state: absent

- name: Configure PVE No-Subscription repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ pve_distribution }}
      Components: pve-no-subscription
      Enabled: {{ 'yes' if pve_no_subscription_repo_enabled else 'no' }}
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: '0644'
  when: pve_no_subscription_repo_enabled | bool

- name: Configure PVE Test repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ pve_distribution }}
      Components: pvetest
      Enabled: {{ 'yes' if pve_test_repo_enabled else 'no' }}
    dest: /etc/apt/sources.list.d/pve-test.sources
    mode: '0644'
  when: pve_test_repo_enabled | bool

- name: Remove PVE Test repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-test.sources
    state: absent
  when: not pve_test_repo_enabled | bool

- name: Configure Ceph repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-{{ pve_ceph_repo_component }}
      Suites: {{ pve_distribution }}
      Components: {{ pve_ceph_repo_component }}
      Enabled: {{ 'yes' if pve_ceph_repo_enabled else 'no' }}
    dest: "/etc/apt/sources.list.d/ceph-{{ pve_ceph_repo_component }}.sources"
    mode: '0644'
  when:
    - pve_ceph_repo_enabled | bool
    - pve_ceph_repo_component is defined

- name: Remove Ceph repository
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/ceph-{{ pve_ceph_repo_component }}.sources"
    state: absent
  when:
    - not pve_ceph_repo_enabled | bool
    - pve_ceph_repo_component is defined

- name: Remove generic Ceph repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.sources
    state: absent
  when: not pve_ceph_repo_enabled | bool

- name: Configure PVE Enterprise repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/pve
      Suites: {{ pve_distribution }}
      Components: pve-enterprise
      Enabled: {{ 'yes' if pve_enterprise_repo_enabled else 'no' }}
    dest: /etc/apt/sources.list.d/pve-enterprise.sources
    mode: '0644'
