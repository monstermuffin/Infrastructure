---
- name: Reset deploy change flags for {{ _app_name }}
  ansible.builtin.set_fact:
    _image_changed: false
    _setup_changed: false
  tags: always

- name: Set up bind mount directories for {{ _app_name }}
  ansible.builtin.include_tasks: setup_volumes.yml
  tags: [volumes, setup, config]

- name: Get current image digest for {{ _app_name }}
  ansible.builtin.command:
    argv:
      - podman
      - image
      - inspect
      - "--format={{ '{{' }}.Id{{ '}}' }}"
      - "{{ _app.image }}:{{ _app.tag | default('latest') }}"
  register: _image_id_before
  changed_when: false
  failed_when: false
  tags: [image, config]

- name: Pull image for {{ _app_name }}
  ansible.builtin.command:
    cmd: podman pull {{ _app.image }}:{{ _app.tag | default('latest') }}
  register: _pull_result
  changed_when: false
  tags: [image, config]

- name: Get new image digest for {{ _app_name }}
  ansible.builtin.command:
    argv:
      - podman
      - image
      - inspect
      - "--format={{ '{{' }}.Id{{ '}}' }}"
      - "{{ _app.image }}:{{ _app.tag | default('latest') }}"
  register: _image_id_after
  changed_when: false
  tags: [image, config]

# Image changed if: digest differs, or image didn't exist before
- name: Set image changed fact for {{ _app_name }}
  ansible.builtin.set_fact:
    _image_changed: "{{ _image_id_before.rc | default(1) != 0 or _image_id_before.stdout != _image_id_after.stdout }}"
  tags: [image, config]

- name: Deploy Quadlet file for {{ _app_name }}
  ansible.builtin.template:
    src: app.container.j2
    dest: /etc/containers/systemd/{{ _app_name }}.container
    mode: '0644'
  register: _quadlet_result

- name: Reload systemd daemon for {{ _app_name }} # noqa: no-handler
  ansible.builtin.systemd:
    daemon_reload: true
  when: _quadlet_result.changed or _setup_changed

# Stop explicitly before starting when changes require a restart, using `state: restarted`
# causes Netavark to accumulate stale nftables DNAT rules (bug?)
- name: Stop service before restart for {{ _app_name }}
  ansible.builtin.systemd:
    name: "{{ _app_name }}.service"
    state: stopped
  when:
    - _app.service_start | default(true)
    - _quadlet_result.changed or _image_changed or _setup_changed
  failed_when: false

- name: Enable and start service for {{ _app_name }}
  ansible.builtin.systemd:
    name: "{{ _app_name }}.service"
    enabled: "{{ _app.service_enable | default(true) }}"
    state: started
  when: _app.service_start | default(true)

# Reload network rules before checking port — Netavark accumulates stale nftables DNAT
# rules across stop/start cycles; without this the port is unreachable until reboot.
- name: Reload Podman network rules for {{ _app_name }}
  # noqa: no-handler
  ansible.builtin.command:
    argv:
      - podman
      - network
      - reload
      - "{{ _app.container_name | default(_app_name) }}"
  changed_when: false
  failed_when: false
  when:
    - _app.service_start | default(true)
    - _quadlet_result.changed or _image_changed or _setup_changed
    - _app.network_mode is not defined

- name: Wait for nftables rules to propagate for {{ _app_name }}
  ansible.builtin.pause:
    seconds: 3
  when:
    - _app.service_start | default(true)
    - _quadlet_result.changed or _image_changed or _setup_changed
    - _app.network_mode is not defined
    - _app.port is defined or _app.ports is defined

- name: Wait for service port for {{ _app_name }}
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ _app.port | default(_app.ports[0].split(':')[0]) }}"
    delay: 2
    timeout: "{{ _app.startup_timeout | default(20) }}"
  when:
    - _app.service_start | default(true)
    - _app.port is defined or _app.ports is defined
    - _quadlet_result.changed or _image_changed or _setup_changed

- name: Get service status for {{ _app_name }}
  ansible.builtin.systemd:
    name: "{{ _app_name }}.service"
  register: _service_status
  when: _image_changed or _quadlet_result.changed or _setup_changed

- name: Display service status for {{ _app_name }}
  ansible.builtin.debug:
    msg:
      - "Service: {{ _app_name }}.service → {{ _service_status.status.ActiveState }}"
      - "Web UI: http://{{ ansible_host | default(inventory_hostname) }}:{{ _app.port | default('(no port)') }}"
  when: _image_changed or _quadlet_result.changed or _setup_changed
