---
# Volume setup and file deployment for {{ _app_name }}.
# Tagged [volumes, setup], skipped on --tags image,deploy runs.
# Runs on first deploy or when volumes/mounts change.

- name: Inspect bind mount sources for {{ _app_name }}
  ansible.builtin.stat:
    path: "{{ vol | split(':') | first }}"
  register: _podman_bind_mount_sources
  loop: "{{ _app.volumes | default([]) }}"
  loop_control:
    loop_var: vol
    label: "{{ vol | split(':') | first }}"
  when: (vol | split(':') | first) is match('^/(?!(dev|proc|sys|run|tmp|mnt)(/|$))')

- name: Probe which bind mount sources are mountpoints for {{ _app_name }}
  ansible.builtin.command:
    cmd: "mountpoint -q {{ vol | split(':') | first | quote }}"
  register: _podman_mountpoint_probe
  loop: "{{ _app.volumes | default([]) }}"
  loop_control:
    loop_var: vol
    label: "{{ vol | split(':') | first }}"
  when: (vol | split(':') | first) is match('^/(?!(dev|proc|sys|run|tmp|mnt)(/|$))')
  changed_when: false
  failed_when: false

- name: Build mountpoint path set for {{ _app_name }}
  ansible.builtin.set_fact:
    _podman_mountpoints: >-
      {{
        _podman_mountpoint_probe.results
        | selectattr('skipped', 'undefined')
        | selectattr('rc', 'defined')
        | selectattr('rc', 'equalto', 0)
        | map(attribute='vol')
        | map('split', ':')
        | map('first')
        | list
      }}

- name: Create bind mount directories for {{ _app_name }}
  ansible.builtin.file:
    path: >-
      {{
        (
          vol | split(':') | first
          if not (
            not mount_source.stat.exists and
            (vol | split(':') | first | basename is search('\\.'))
          )
          else
          (vol | split(':') | first | dirname)
        )
      }}
    state: directory
    owner: root
    group: root
    mode: '1777'
  loop: "{{ _podman_bind_mount_sources.results | default([]) }}"
  loop_control:
    loop_var: mount_source
    label: "{{ mount_source.vol | split(':') | first }}"
  vars:
    vol: "{{ mount_source.vol }}"
  register: _bind_mount_dirs_result
  when:
    - mount_source.stat is defined
    - not (mount_source.stat.exists and mount_source.stat.isreg | default(false))
    - mount_source.stat.exists
    - (mount_source.stat.mode | default('')) in ['1777', '01777']
    # LXC mountpoints can't be chown'd and so skip
    - (vol | split(':') | first) not in _podman_mountpoints

- name: Track setup changes from existing bind mount directories for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_bind_mount_dirs_result is changed) }}"
  tags: [volumes, setup, config]

- name: Create managed bind mount directories for {{ _app_name }}
  ansible.builtin.file:
    path: >-
      {{
        (
          vol | split(':') | first
          if not (
            not mount_source.stat.exists and
            (vol | split(':') | first | basename is search('\\.'))
          )
          else
          (vol | split(':') | first | dirname)
        )
      }}
    state: directory
    owner: "{{ _app.uid | default(0) }}"
    group: "{{ _app.gid | default(0) }}"
    mode: '0755'
  loop: "{{ _podman_bind_mount_sources.results | default([]) }}"
  loop_control:
    loop_var: mount_source
    label: "{{ mount_source.vol | split(':') | first }}"
  vars:
    vol: "{{ mount_source.vol }}"
  register: _managed_bind_mount_dirs_result
  when:
    - mount_source.stat is defined
    - not (mount_source.stat.exists and mount_source.stat.isreg | default(false))
    - not (mount_source.stat.exists and (mount_source.stat.mode | default('')) in ['1777', '01777'])
    # not symlink
    - not (mount_source.stat.islnk | default(false))
    # LXC mountpoints can't be chown'd and so skip
    - (vol | split(':') | first) not in _podman_mountpoints

- name: Track setup changes from managed bind mount directories for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_bind_mount_dirs_result is changed) }}"
  tags: [volumes, setup, config]

- name: Inspect managed file destinations for {{ _app_name }}
  ansible.builtin.stat:
    path: "{{ file_item.dest }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_file_destinations
  tags: [volumes, setup, config]

- name: Create parent directories for managed files for {{ _app_name }}
  ansible.builtin.file:
    path: "{{ file_item.dest | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest | dirname }}"
  register: _managed_file_parent_dirs_result
  tags: [volumes, setup, config]

- name: Track setup changes from managed file parent directories for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_file_parent_dirs_result is changed) }}"
  tags: [volumes, setup, config]

- name: Remove stale directory placeholders for managed file bind mounts for {{ _app_name }}
  ansible.builtin.file:
    path: "{{ file_item.dest }}"
    state: absent
  loop: "{{ _managed_file_destinations.results | default([]) }}"
  loop_control:
    loop_var: managed_file_stat
    label: "{{ managed_file_stat.file_item.dest }}"
  vars:
    file_item: "{{ managed_file_stat.file_item }}"
    _volume_source_paths: "{{ _app.volumes | default([]) | map('split', ':') | map('first') | list }}"
  register: _managed_file_cleanup_result
  when:
    - managed_file_stat.stat.isdir | default(false)
    - file_item.dest in _volume_source_paths
    - file_item.dest | basename is search('\\.')
  tags: [volumes, setup, config]

- name: Track setup changes from managed file cleanup for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_file_cleanup_result is changed) }}"
  tags: [volumes, setup, config]

- name: Re-inspect managed file destinations for {{ _app_name }}
  ansible.builtin.stat:
    path: "{{ file_item.dest }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_file_destinations_final
  tags: [volumes, setup, config]

- name: Fail when managed file destinations are directories for {{ _app_name }}
  ansible.builtin.fail:
    msg: >-
      Managed file destination {{ managed_file_stat.file_item.dest }} is a directory on the target host.
  loop: "{{ _managed_file_destinations_final.results | default([]) }}"
  loop_control:
    loop_var: managed_file_stat
    label: "{{ managed_file_stat.file_item.dest }}"
  when: managed_file_stat.stat.isdir | default(false)
  tags: [volumes, setup, config]

- name: Deploy managed files for {{ _app_name }}
  ansible.builtin.copy:
    content: "{{ file_item.content }}"
    dest: "{{ file_item.dest }}"
    owner: "{{ file_item.owner | default('root') }}"
    group: "{{ file_item.group | default('root') }}"
    mode: "{{ file_item.mode | default('0640') }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_files_result
  when: file_item.content is defined
  tags: [volumes, setup, config]

- name: Deploy managed templated files for {{ _app_name }}
  ansible.builtin.template:
    src: >-
      {{
        file_item.template_src
        if (file_item.template_src | regex_search('^/'))
        else (playbook_dir ~ '/../../inventory/host_vars/' ~ inventory_hostname ~ '/files/' ~ file_item.template_src)
      }}
    dest: "{{ file_item.dest }}"
    owner: "{{ file_item.owner | default('root') }}"
    group: "{{ file_item.group | default('root') }}"
    mode: "{{ file_item.mode | default('0640') }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_template_files_result
  when: file_item.template_src is defined
  tags: [volumes, setup, config]

- name: Track setup changes from managed files for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: >-
      {{
        _setup_changed
        or (_managed_files_result is changed)
        or (_managed_template_files_result is changed)
      }}
  tags: [volumes, setup, config]

- name: Run setup commands for managed files for {{ _app_name }} # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: "{{ file_item.setup_command }}"
    creates: "{{ file_item.dest }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_setup_command_result
  when: file_item.setup_command is defined
  tags: [volumes, setup, config]

- name: Track setup changes from command-generated files for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_setup_command_result is changed) }}"
  tags: [volumes, setup, config]
