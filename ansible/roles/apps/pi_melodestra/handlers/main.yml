---
- name: Restart pulsedestra
  ansible.builtin.systemd:
    name: pulsedestra
    state: restarted
    daemon_reload: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart lightdm
  ansible.builtin.debug:
    msg: "LightDM config changed; changes take effect on next login/reboot."

- name: Restart kanshi service
  ansible.builtin.systemd_service:
    name: kanshi.service
    scope: user
    daemon_reload: true
    state: restarted
  become: true
  become_user: "{{ pi_melodestra_kiosk_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ pi_melodestra_kiosk_uid }}"
