---
- name: Create config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ wgtun_config_dir }}"
    - "{{ wgtun_config_dir }}/gluetun"
    - "{{ wgtun_config_dir }}/gluetun/auth"
    - "{{ wgtun_config_dir }}/qbittorrent"
    - "{{ wgtun_config_dir }}/firefox"
  tags: [directories, setup]

- name: Create filebrowser config directory
  ansible.builtin.file:
    path: "{{ wgtun_config_dir }}/filebrowser"
    state: directory
    owner: 1000
    group: 1000
    mode: "0755"
  tags: [directories, setup]

- name: Seed filebrowser config
  ansible.builtin.copy:
    dest: "{{ wgtun_config_dir }}/filebrowser/config.yaml"
    owner: 1000
    group: 1000
    mode: "0640"
    force: false
    content: |
      server:
        sources:
          - path: /srv
            config:
              defaultEnabled: true
  tags: [filebrowser, config]

- name: Deploy gluetun auth config
  ansible.builtin.template:
    src: gluetun_auth.toml.j2
    dest: "{{ wgtun_config_dir }}/gluetun/auth/config.toml"
    owner: root
    group: root
    mode: "0640"
  tags: [auth, config, gluetun]

- name: Create qBittorrent state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ wgtun_qbittorrent_uid }}"
    group: "{{ wgtun_qbittorrent_gid }}"
    mode: "0755"
  loop:
    - "{{ wgtun_qbittorrent_state_dir }}"
    - "{{ wgtun_qbittorrent_state_dir }}/BT_backup"
    - "{{ wgtun_qbittorrent_state_dir }}/logs"
    - "{{ wgtun_qbittorrent_state_dir }}/rss"
    - "{{ wgtun_qbittorrent_state_dir }}/rss/articles"
    - "{{ wgtun_qbittorrent_cache_dir }}"
  tags: [directories, qbittorrent, config]

- name: Install qBittorrent support packages
  ansible.builtin.apt:
    name:
      - git
    state: present
    update_cache: true
  when: wgtun_qbittorrent_altui_enabled
  tags: [qbittorrent, config, theme]

- name: Clone VueTorrent
  ansible.builtin.git:
    repo: "{{ wgtun_qbittorrent_altui_repo }}"
    dest: "{{ wgtun_qbittorrent_altui_dir_host }}"
    version: "{{ wgtun_qbittorrent_altui_version }}"
    single_branch: true
    force: true
    update: true
  when: wgtun_qbittorrent_altui_enabled
  tags: [qbittorrent, config, theme]

- name: Ensure qBittorrent.conf exists
  ansible.builtin.copy:
    dest: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    content: |
      [Preferences]
    owner: "{{ wgtun_qbittorrent_uid }}"
    group: "{{ wgtun_qbittorrent_gid }}"
    mode: "0644"
    force: false
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Ensure qBittorrent Preferences section exists
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^\[Preferences\]$'
    line: "[Preferences]"
    insertbefore: BOF
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Enable qBittorrent alternative WebUI
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\AlternativeUIEnabled='
    line: 'WebUI\AlternativeUIEnabled=true'
    insertafter: '^\[Preferences\]$'
  when: wgtun_qbittorrent_altui_enabled
  notify: Restart qbittorrent
  tags: [qbittorrent, config, theme]

- name: Set qBittorrent alternative WebUI root folder
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\RootFolder='
    line: 'WebUI\RootFolder={{ wgtun_qbittorrent_altui_dir_container }}'
    insertafter: '^\[Preferences\]$'
  when: wgtun_qbittorrent_altui_enabled
  notify: Restart qbittorrent
  tags: [qbittorrent, config, theme]

- name: Set qBittorrent Host header validation
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\HostHeaderValidation='
    line: 'WebUI\HostHeaderValidation={{ wgtun_qbittorrent_host_header_validation | ternary("true", "false") }}'
    insertafter: '^\[Preferences\]$'
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Set qBittorrent auth subnet whitelist state
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\AuthSubnetWhitelistEnabled='
    line: 'WebUI\AuthSubnetWhitelistEnabled={{ wgtun_qbittorrent_auth_subnet_whitelist_enabled | ternary("true", "false") }}'
    insertafter: '^\[Preferences\]$'
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Set qBittorrent auth subnet whitelist
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\AuthSubnetWhitelist='
    line: 'WebUI\AuthSubnetWhitelist={{ wgtun_qbittorrent_auth_subnet_whitelist }}'
    insertafter: '^\[Preferences\]$'
  when: wgtun_qbittorrent_auth_subnet_whitelist | length > 0
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Remove qBittorrent auth subnet whitelist when unset
  ansible.builtin.lineinfile:
    path: "{{ wgtun_qbittorrent_state_dir }}/qBittorrent.conf"
    regexp: '^WebUI\\AuthSubnetWhitelist='
    state: absent
  when: wgtun_qbittorrent_auth_subnet_whitelist | length == 0
  notify: Restart qbittorrent
  tags: [qbittorrent, config]

- name: Ensure qBittorrent state ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ wgtun_qbittorrent_uid }}"
    group: "{{ wgtun_qbittorrent_gid }}"
    recurse: true
  loop:
    - "{{ wgtun_qbittorrent_state_dir }}"
    - "{{ wgtun_qbittorrent_cache_dir }}"
  tags: [qbittorrent, config]
