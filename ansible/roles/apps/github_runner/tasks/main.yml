---
- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - git
      - git-crypt
      - python3
      - python3-venv
      - python3-yaml
      - python3-requests
      - pipx
    state: present
    update_cache: true
  tags: [packages, install]

- name: Create github-runner user
  ansible.builtin.user:
    name: "{{ github_runner_user }}"
    home: "{{ github_runner_home }}"
    shell: /bin/bash
    system: true
    create_home: true
  tags: [user, setup]

- name: Install ansible via pipx as runner user
  ansible.builtin.command:
    cmd: pipx install --include-deps ansible
    creates: "{{ github_runner_home }}/.local/bin/ansible"
  become_user: "{{ github_runner_user }}"
  environment:
    HOME: "{{ github_runner_home }}"
    PIPX_HOME: "{{ github_runner_home }}/.local/pipx"
    PIPX_BIN_DIR: "{{ github_runner_home }}/.local/bin"
  tags: [packages, install]

- name: Check if requests is in ansible pipx venv
  ansible.builtin.command:
    cmd: "{{ github_runner_home }}/.local/pipx/venvs/ansible/bin/python3 -c 'import requests'"
  become_user: "{{ github_runner_user }}"
  register: _requests_check
  failed_when: false
  changed_when: false
  tags: [packages, install]

- name: Inject requests into ansible pipx venv
  ansible.builtin.command:
    cmd: pipx inject ansible requests
  become_user: "{{ github_runner_user }}"
  environment:
    HOME: "{{ github_runner_home }}"
    PIPX_HOME: "{{ github_runner_home }}/.local/pipx"
    PIPX_BIN_DIR: "{{ github_runner_home }}/.local/bin"
  when: _requests_check.rc != 0
  tags: [packages, install]

- name: Get latest runner version
  when: github_runner_version == 'latest'
  block:
    - name: Fetch latest release tag
      ansible.builtin.uri:
        url: https://api.github.com/repos/actions/runner/releases/latest
        return_content: true
      register: _runner_release

    - name: Set runner version fact
      ansible.builtin.set_fact:
        _github_runner_version: "{{ _runner_release.json.tag_name | regex_replace('^v', '') }}"

- name: Set runner version fact (explicit)
  ansible.builtin.set_fact:
    _github_runner_version: "{{ github_runner_version }}"
  when: github_runner_version != 'latest'

- name: Check if runner binary already installed
  ansible.builtin.stat:
    path: "{{ github_runner_home }}/bin/Runner.Listener"
  register: _runner_binary
  tags: [install]

- name: Download and extract runner
  when: not _runner_binary.stat.exists
  tags: [install]
  block:
    - name: Download runner tarball
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ _github_runner_version }}/actions-runner-linux-x64-{{ _github_runner_version }}.tar.gz"
        dest: /tmp/actions-runner.tar.gz
        mode: "0644"

    - name: Extract runner
      ansible.builtin.unarchive:
        src: /tmp/actions-runner.tar.gz
        dest: "{{ github_runner_home }}"
        remote_src: true
        owner: "{{ github_runner_user }}"
        group: "{{ github_runner_user }}"

    - name: Remove tarball
      ansible.builtin.file:
        path: /tmp/actions-runner.tar.gz
        state: absent

- name: Create .ssh directory for runner user
  ansible.builtin.file:
    path: "{{ github_runner_home }}/.ssh"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0700"
  tags: [secrets, configure]

- name: Write Ansible SSH private key
  ansible.builtin.copy:
    content: "{{ github_runner_ansible_ssh_key }}"
    dest: "{{ github_runner_home }}/.ssh/ansible_ed25519"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0600"
  no_log: true
  when: github_runner_ansible_ssh_key | length > 0
  tags: [secrets, configure]

- name: Write runner environment file
  ansible.builtin.template:
    src: runner.env.j2
    dest: "{{ github_runner_home }}/.env"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0600"
  no_log: true
  tags: [secrets, configure]

- name: Get runner registration token
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ github_runner_repo }}/actions/runners/registration-token"
    method: POST
    headers:
      Authorization: "Bearer {{ github_runner_pat }}"
      Accept: application/vnd.github+json
    status_code: 201
  register: _runner_reg_token
  no_log: true
  tags: [register]

- name: Check if runner already configured
  ansible.builtin.stat:
    path: "{{ github_runner_home }}/.runner"
  register: _runner_config
  tags: [register]

- name: Configure runner
  ansible.builtin.command:
    cmd: >-
      ./config.sh
      --url https://github.com/{{ github_runner_repo }}
      --token {{ _runner_reg_token.json.token }}
      --name {{ github_runner_name }}
      --labels {{ github_runner_labels | join(',') }}
      --runnergroup "{{ github_runner_group }}"
      --unattended
      --replace
    chdir: "{{ github_runner_home }}"
  become: true
  become_user: "{{ github_runner_user }}"
  no_log: true
  when: not _runner_config.stat.exists
  changed_when: true
  tags: [register]

- name: Install runner systemd service
  ansible.builtin.command:
    cmd: ./svc.sh install {{ github_runner_user }}
    chdir: "{{ github_runner_home }}"
    creates: /etc/systemd/system/actions.runner.*.service
  tags: [service]

- name: Read installed runner service name
  ansible.builtin.slurp:
    src: "{{ github_runner_home }}/.service"
  register: _runner_service_file
  tags: [service]

- name: Set runner service name fact
  ansible.builtin.set_fact:
    _github_runner_service_name: "{{ _runner_service_file.content | b64decode | trim }}"
  tags: [service]

- name: Start and enable runner service
  ansible.builtin.systemd:
    name: "{{ _github_runner_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  tags: [service]
