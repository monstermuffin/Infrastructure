---
podman_enabled: false

podman_packages:
  - podman
  - podman-compose
  - crun
  - netavark
  - aardvark-dns

podman_package_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64

podman_package_arch: "{{ podman_package_arch_map.get(ansible_architecture | default(''), ansible_architecture | default('')) }}"

podman_package_versions_by_suite:
  bookworm:
    podman:
      amd64: "{{ podman_package_version_podman_bookworm_amd64 | default('') }}"
      arm64: "{{ podman_package_version_podman_bookworm_arm64 | default('') }}"
    podman-compose: "{{ podman_package_version_podman_compose_bookworm | default('') }}"
    crun: "{{ podman_package_version_crun_bookworm | default('') }}"
    # renovate: suite=bookworm depName=netavark
    netavark: "1.4.0-3"
    # renovate: suite=bookworm depName=aardvark-dns
    aardvark-dns: "1.4.0-3"
  trixie:
    podman:
      amd64: "{{ podman_package_version_podman_trixie_amd64 | default('') }}"
      arm64: "{{ podman_package_version_podman_trixie_arm64 | default('') }}"
    podman-compose: "{{ podman_package_version_podman_compose_trixie | default('') }}"
    crun: "{{ podman_package_version_crun_trixie | default('') }}"
    # renovate: suite=trixie depName=netavark
    netavark: "1.14.0-2"
    # renovate: suite=trixie depName=aardvark-dns
    aardvark-dns: "1.14.0-3"

podman_package_versions: "{{ podman_package_versions_by_suite.get(ansible_distribution_release | default(''), {}) }}"

podman_registries:
  - docker.io
  - ghcr.io

podman_registries_insecure: []
podman_registries_blocked: []
podman_networks: {}
podman_volumes: {}

podman_user_shell: /bin/bash
podman_user_system: true

# systemd calendar expression for podman-auto-update timer (e.g. "*:0/5" for every 5 min).
# Empty string disables the timer entirely.
podman_auto_update_interval: ""
