---

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - packages
    - setup

- name: Build Podman package specs
  ansible.builtin.set_fact:
    _podman_package_specs: "{{ _podman_package_specs | default([]) + [_podman_package_spec] }}"
  vars:
    _podman_package_version_entry: "{{ podman_package_versions[item] | default('') }}"
    _podman_package_version: >-
      {{
        _podman_package_version_entry.get(podman_package_arch, '')
        if _podman_package_version_entry is mapping
        else _podman_package_version_entry
      }}
    _podman_package_spec: >-
      {{
        item ~ '=' ~ _podman_package_version
        if _podman_package_version | length > 0
        else item
      }}
  loop: "{{ podman_packages }}"
  tags:
    - packages
    - setup

- name: Install Podman packages
  ansible.builtin.apt:
    name: "{{ _podman_package_specs }}"
    state: present
  tags:
    - packages
    - setup

- name: Create containers config directory
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Configure container registries
  ansible.builtin.template:
    src: registries.conf.j2
    dest: /etc/containers/registries.conf
    mode: '0644'
    owner: root
    group: root

- name: Create systemd Quadlet directory
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Verify Podman installation
  ansible.builtin.command:
    cmd: podman --version
  register: podman_version_output
  changed_when: false
  tags:
    - verify
    - setup

- name: Display Podman version
  ansible.builtin.debug:
    msg: "Podman installed: {{ podman_version_output.stdout }}"
  tags:
    - verify
    - setup

- name: Create podman-auto-update timer drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/podman-auto-update.timer.d
    state: directory
    mode: '0755'
  when: podman_auto_update_interval | length > 0
  tags:
    - setup
    - auto-update

- name: Configure podman-auto-update timer interval
  ansible.builtin.copy:
    dest: /etc/systemd/system/podman-auto-update.timer.d/interval.conf
    content: |
      [Timer]
      OnCalendar=
      OnCalendar={{ podman_auto_update_interval }}
      RandomizedDelaySec=0
    mode: '0644'
  notify: Reload systemd daemon
  when: podman_auto_update_interval | length > 0
  tags:
    - setup
    - auto-update

- name: Remove podman-auto-update timer drop-in when interval unset
  ansible.builtin.file:
    path: /etc/systemd/system/podman-auto-update.timer.d/interval.conf
    state: absent
  notify: Reload systemd daemon
  when: podman_auto_update_interval | length == 0
  tags:
    - setup
    - auto-update

- name: Enable and start podman-auto-update timer
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: "{{ podman_auto_update_interval | length > 0 }}"
    state: "{{ 'started' if podman_auto_update_interval | length > 0 else 'stopped' }}"
    daemon_reload: false
  tags:
    - setup
    - auto-update
