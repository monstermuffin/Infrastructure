podman_apps:
  zipline-postgres:
    enabled: true
    image: postgres
    # renovate: datasource=docker depName=postgres
    tag: "18"
    container_name: zipline-postgres
    network: zipline
    uid: 999
    gid: 999
    volumes:
      - /opt/zipline/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_USER: zipline
      POSTGRES_PASSWORD: "{{ zipline_db_password | trim }}"
      POSTGRES_DB: zipline
      PGDATA: /var/lib/postgresql/data

  zipline:
    enabled: true
    image: ghcr.io/diced/zipline
    # renovate: datasource=docker depName=ghcr.io/diced/zipline
    tag: 4.5.2
    port: 3000
    user: "989:987"
    uid: 989
    gid: 987
    network: zipline
    after:
      - zipline-postgres.service
    requires:
      - zipline-postgres.service
    volumes:
      - /opt/zipline/uploads:/zipline/uploads
      - /opt/zipline/public:/zipline/public
      - /opt/zipline/themes:/zipline/themes
    env:
      TZ: Europe/London
      CORE_SECRET: "{{ zipline_core_secret | trim }}"
      DATABASE_URL: "postgres://zipline:{{ zipline_db_password | trim }}@zipline-postgres:5432/zipline"
      CORE_RETURN_HTTPS: "true"
      EXIF_ENABLED: "true"
      EXIF_REMOVE_GPS: "true"
      DATASOURCE_LOCAL_DIRECTORY: /zipline/uploads
      DEBUG: zipline
      NODE_ENV: production
