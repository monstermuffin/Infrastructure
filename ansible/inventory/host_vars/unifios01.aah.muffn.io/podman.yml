---
podman_enabled: true

podman_apps:
  unifios:
    enabled: true
    image: ghcr.io/lemker/unifi-os-server
    # renovate: datasource=docker depName=ghcr.io/lemker/unifi-os-server
    tag: v1.2.0
    description: UniFi OS Server
    network_mode: host
    # UniFi OS runs systemd as PID 1 which needs CAP_SYS_ADMIN to mount tmpfs at
    # /run and /run/lock on startup. Without --privileged the container exits 255
    # immediately in detached mode even though it appears to work in foreground.
    privileged: true
    # Unprivileged LXC blocks nested user namespace creation (newuidmap fails).
    # userns=host skips the extra namespace and uses the LXC's own namespace.
    userns: host
    shm_size: 64m
    # Quadlet hardcodes --cgroups=split which conflicts in an unprivileged LXC.
    # --cgroups=disabled (appended last) overrides it.
    podman_args:
      - "--cgroups=disabled"
    volumes:
      - /opt/unifios/persistent:/persistent
      - /opt/unifios/var-log:/var/log
      - /opt/unifios/data:/data
      - /opt/unifios/srv:/srv
      - /opt/unifios/var-lib-unifi:/var/lib/unifi
      - /opt/unifios/var-lib-mongodb:/var/lib/mongodb
      - /opt/unifios/etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    env:
      UOS_SYSTEM_IP: "10.82.7.144"
