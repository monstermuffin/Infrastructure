---
podman_enabled: true

podman_networks:
  sure: {}

podman_apps:
  sure-db:
    enabled: true
    image: postgres
    # renovate: datasource=docker depName=postgres versioning=regex:^(?<major>16.13-trixie)(\.(?<minor>\d+)(\.(?<patch>\d+))?)?(-.*)?$
    tag: "16.13-trixie"
    container_name: sure-db
    network: sure
    uid: 999
    gid: 999
    volumes:
      - /opt/sure/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_USER: sure
      POSTGRES_PASSWORD: "{{ sure_db_password | trim }}"
      POSTGRES_DB: sure_production
      TZ: Europe/London

  sure-redis:
    enabled: true
    image: redis
    # renovate: datasource=docker depName=redis versioning=regex:^(?<major>7)(\.(?<minor>\d+)(\.(?<patch>\d+))?)?(-.*)?$
    tag: "7"
    container_name: sure-redis
    network: sure
    uid: 999
    gid: 999
    volumes:
      - /opt/sure/redis:/data

