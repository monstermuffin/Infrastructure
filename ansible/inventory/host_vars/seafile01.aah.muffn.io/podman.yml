---
podman_enabled: true

seafile_nfs_server: "10.82.7.122"
seafile_nfs_path: "/mnt/pool-01/containers/seafile"
seafile_nfs_opts: "rw,nolock,soft,nfsvers=4"
seafile_nfs_volume_name: "seafile-data"
seafile_max_download_dir_size_mb: 10240

podman_networks:
  seafile:
    driver: bridge

podman_volumes:
  "{{ seafile_nfs_volume_name }}":
    driver: local
    type: nfs
    device: "{{ seafile_nfs_server }}:{{ seafile_nfs_path }}"
    options: "{{ seafile_nfs_opts }}"

podman_apps:
  mariadb:
    enabled: true
    image: mariadb
    # renovate: datasource=docker depName=mariadb versioning=regex:^(?<major>10)\.(?<minor>11)(\.(?<patch>\d+))?(-.*)?$
    tag: "10.11.18-ubi9"
    network: seafile
    volumes:
      - /opt/seafile/db:/var/lib/mysql
    env:
      MYSQL_ROOT_PASSWORD: "{{ seafile_db_root_password | trim }}"
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
    restart: always

  redis:
    enabled: true
    image: redis
    # renovate: datasource=docker depName=redis versioning=regex:^(?<major>7)(\.(?<minor>\d+)(\.(?<patch>\d+))?)?(-.*)?$
    tag: "7"
    network: seafile
    restart: always

  seafile:
    enabled: true
    image: seafileltd/seafile-pro-mc
    # renovate: datasource=docker depName=seafileltd/seafile-pro-mc
    tag: 13.0.24
    port: 8443
    container_port: 443
    network: seafile
    after:
      - mariadb.service
      - redis.service
    requires:
      - mariadb.service
      - redis.service
    security_label_disable: true
    volumes:
      - "{{ seafile_nfs_volume_name }}:/shared"
      - /opt/seafile/ssl:/shared/ssl:ro
      - /opt/seafile/nginx/seafile.nginx.conf:/etc/nginx/sites-enabled/seafile.nginx.conf:ro
      - /opt/seafile/conf/seafile.conf:/shared/seafile/conf/seafile.conf
      - /opt/seafile/conf/seahub_settings.py:/shared/seafile/conf/seahub_settings.py
    files:
      - dest: /opt/seafile/ssl/{{ inventory_hostname }}.crt
        content: "{{ seafile_tls_cert }}"
        mode: '0644'
      - dest: /opt/seafile/ssl/{{ inventory_hostname }}.key
        content: "{{ seafile_tls_key }}"
        mode: '0600'
      - dest: /opt/seafile/nginx/seafile.nginx.conf
        template_src: seafile.nginx.conf.j2
        mode: '0644'
      - dest: /opt/seafile/conf/seahub_settings.py
        template_src: seahub_settings.py.j2
        mode: '0755'
      - dest: /opt/seafile/conf/seafile.conf
        template_src: seafile.conf.j2
        mode: '0644'
    env:
      TZ: Europe/London
      TIME_ZONE: Europe/London
      SEAFILE_SERVER_HOSTNAME: "{{ seafile_public_hostname | trim }}"
      SEAFILE_SERVER_PROTOCOL: "https"
      DB_HOST: mariadb
      DB_ROOT_PASSWD: "{{ seafile_db_root_password | trim }}"
      # Seafile 13.x renamed these env vars
      SEAFILE_MYSQL_DB_HOST: mariadb
      SEAFILE_MYSQL_DB_USER: seafile
      SEAFILE_MYSQL_DB_PASSWORD: "{{ seafile_db_password | trim }}"
      INIT_SEAFILE_MYSQL_ROOT_PASSWORD: "{{ seafile_db_root_password | trim }}"
      SEAFILE_ADMIN_EMAIL: "{{ seafile_admin_email | trim }}"
      SEAFILE_ADMIN_PASSWORD: "{{ seafile_admin_password | trim }}"
      SEAFILE_SERVER_LETSENCRYPT: "false"
      FORCE_HTTPS_IN_CONF: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_PRIVATE_KEY: "{{ seafile_jwt_private_key | trim }}"
    restart: always
