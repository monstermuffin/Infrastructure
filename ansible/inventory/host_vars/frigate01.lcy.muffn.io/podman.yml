---
podman_enabled: true

podman_apps:
  frigate:
    enabled: true
    image: ghcr.io/blakeblackshear/frigate
    # renovate: datasource=docker depName=ghcr.io/blakeblackshear/frigate
    tag: "0.18.0-beta1"
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      - /opt/frigate/config:/config
      - /opt/frigate/media:/media/frigate
    tmpfs:
      - /tmp/cache
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
    shm_size: "512m"
    cap_add:
      - CAP_PERFMON
    files:
      - dest: /opt/frigate/config/config.yml
        template_src: config.yml.j2
        owner: root
        group: root
        mode: "0640"
      # YOLOv9-t ONNX model for OpenVINO detection.
      # setup_command runs once; skipped on subsequent deploys when the file already exists.
      # Uses a venv at /root/ul_venv (real disk) to avoid filling the /tmp tmpfs which
      # counts against the container's RAM cgroup limit and triggers OOM kills.
      - dest: /opt/frigate/config/model_cache/yolov9t.onnx
        setup_command: >-
          systemctl stop frigate.service 2>/dev/null; true &&
          rm -rf /root/ul_venv /root/yolov9t.pt &&
          DEBIAN_FRONTEND=noninteractive apt-get install -y -q python3-venv libgl1 &&
          python3 -m venv /root/ul_venv &&
          /root/ul_venv/bin/pip install ultralytics --quiet --no-cache-dir &&
          cd /root && /root/ul_venv/bin/python3 -c
          "from ultralytics import YOLO; import shutil;
          shutil.move(str(YOLO('yolov9t.pt').export(format='onnx',imgsz=320,simplify=True)),
          '/opt/frigate/config/model_cache/yolov9t.onnx')" &&
          rm -rf /root/ul_venv /root/yolov9t.pt
        owner: root
        group: root
        mode: "0644"
    env:
      TZ: Europe/London
    startup_timeout: 60

