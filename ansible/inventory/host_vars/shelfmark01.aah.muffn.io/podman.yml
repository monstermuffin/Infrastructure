---
podman_enabled: true

podman_apps:
  shelfmark:
    enabled: true
    image: ghcr.io/calibrain/shelfmark
    # renovate: datasource=docker depName=ghcr.io/calibrain/shelfmark
    tag: v1.3.2
    port: 8084
    uid: 982
    gid: 981
    volumes:
      - /opt/shelfmark:/config
      - /books:/books
    env:
      TZ: Europe/London
      PUID: "982"
      PGID: "981"
      FLASK_PORT: "8084"
      INGEST_DIR: /books
      SEARCH_MODE: direct
      USING_TOR: "false"
      HIDE_LOCAL_AUTH: "true"
      DISABLE_LOCAL_AUTH: "true"
      OIDC_AUTO_REDIRECT: "true"
