---
podman_enabled: true

podman_networks:
  vaultwarden: {}

podman_apps:
  vaultwarden-postgres:
    enabled: true
    image: postgres
    # renovate: datasource=docker depName=postgres
    tag: "18"
    container_name: vaultwarden-postgres
    network: vaultwarden
    uid: 999
    gid: 999
    volumes:
      - /opt/vaultwarden/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_USER: bw
      POSTGRES_PASSWORD: "{{ vaultwarden_db_password | trim }}"
      POSTGRES_DB: bitwardenrs
      PGDATA: /var/lib/postgresql/data

  vaultwarden:
    enabled: true
    image: ghcr.io/dani-garcia/vaultwarden
    # renovate: datasource=docker depName=ghcr.io/dani-garcia/vaultwarden
    tag: 1.36.0
    port: 8443
    container_port: 443
    network: vaultwarden
    after:
      - vaultwarden-postgres.service
    requires:
      - vaultwarden-postgres.service
    volumes:
      - /opt/vaultwarden/data:/data
      - /opt/vaultwarden/ssl:/ssl:ro
    files:
      - dest: /opt/vaultwarden/ssl/cert.pem
        content: "{{ vaultwarden_tls_cert }}"
        mode: '0644'
      - dest: /opt/vaultwarden/ssl/key.pem
        content: "{{ vaultwarden_tls_key }}"
        mode: '0600'
    env:
      TZ: Europe/London
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "443"
      ROCKET_TLS: '{certs="/ssl/cert.pem",key="/ssl/key.pem"}'
      DATABASE_URL: "postgresql://bw:{{ vaultwarden_db_password | trim }}@vaultwarden-postgres:5432/bitwardenrs"
      LOG_FILE: /data/vaultwarden.log
      DOMAIN: "https://{{ vaultwarden_public_hostname }}"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "$argon2id$v=19$m=19456,t=2,p=1$N0hwdGZXTEdnclRHMEdyTWFKcXkyZ08vbjVSMlZmamNKU1BIc053enBxWT0$WSMdM1yL/5STGaXQ6thUw0SC0/NekKt5ZAUTKK8WX6g"
      SSO_ENABLED: "true"
      SSO_ONLY: "false"
      SSO_AUTHORITY: https://id.muffn.io
      SSO_CLIENT_ID: 370dfd58-2a8a-44d3-9851-90dbec968f0d
      SSO_CLIENT_SECRET: "{{ vaultwarden_sso_client_secret | trim }}"
      SSO_SCOPES: "email profile"
      SSO_SIGNUPS_MATCH_EMAIL: "true"
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: "false"
      SSO_CLIENT_CACHE_EXPIRATION: "600"
      SSO_PKCE: "true"
      SSO_AUTH_ONLY_NOT_SESSION: "false"
      IP_HEADER: cf-connecting-ip

vaultwarden_db_password: !vault |
