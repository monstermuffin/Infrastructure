podman_apps:
  grimmory-db:
    enabled: true
    image: mariadb
    # renovate: datasource=docker depName=mariadb
    tag: "12"
    container_name: grimmory-db
    network: grimmory
    uid: 999
    gid: 999
    volumes:
      - /opt/grimmory/mariadb:/var/lib/mysql
    env:
      TZ: Europe/London
      MYSQL_ROOT_PASSWORD: "{{ grimmory_mysql_root_password | trim }}"
      MYSQL_DATABASE: grimmory
      MYSQL_USER: grimmory
      MYSQL_PASSWORD: "{{ grimmory_db_password | trim }}"

  grimmory:
    enabled: true
    image: ghcr.io/grimmory-tools/grimmory
    # renovate: datasource=docker depName=ghcr.io/grimmory-tools/grimmory
    tag: v2.3.0
    container_name: grimmory
    port: 6060
    uid: 982
    gid: 981
    network: grimmory
    after:
      - grimmory-db.service
    requires:
      - grimmory-db.service
    volumes:
      - /opt/grimmory/data:/app/data
      - /opt/grimmory/books:/books
      - /bookdrop:/bookdrop
    env:
      USER_ID: "982"
      GROUP_ID: "981"
      TZ: Europe/London
      DATABASE_URL: >-
        jdbc:mariadb://grimmory-db:3306/grimmory?user=grimmory&password={{
        grimmory_db_password | trim }}&useUnicode=true&characterEncoding=utf8&useSSL=false
      DATABASE_USERNAME: grimmory
      DATABASE_PASSWORD: "{{ grimmory_db_password | trim }}"
      LOG_LEVEL: INFO
      ROOT_LOG_LEVEL: INFO
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
