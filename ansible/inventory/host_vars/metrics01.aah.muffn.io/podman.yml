---
podman_enabled: true

podman_networks:
  metrics: {}

podman_apps:
  victoriametrics:
    enabled: true
    image: victoriametrics/victoria-metrics
    # renovate: datasource=docker depName=victoriametrics/victoria-metrics
    tag: v1.143.0
    ports:
      - 8428:8428
      - 2003:2003
    network: metrics
    volumes:
      - /opt/metrics01/victoria-metrics-data:/victoria-metrics-data
      - /opt/metrics01/scrape.yml:/etc/victoria-metrics/scrape.yml:ro
    files:
      - dest: /opt/metrics01/scrape.yml
        template_src: prometheus.yml.j2
        owner: root
        group: root
        mode: "0644"
    exec: >-
      -storageDataPath=/victoria-metrics-data
      -retentionPeriod=2y
      -promscrape.config=/etc/victoria-metrics/scrape.yml
      -graphiteListenAddr=:2003
    env:
      TZ: Europe/London

  pve-exporter:
    enabled: true
    image: prompve/prometheus-pve-exporter
    # renovate: datasource=docker depName=prompve/prometheus-pve-exporter
    tag: 3.9.0
    port: 9221
    network: metrics
    volumes:
      - /opt/metrics01/pve-exporter.yml:/etc/pve-exporter/pve-exporter.yml:ro
    files:
      - dest: /opt/metrics01/pve-exporter.yml
        template_src: pve-exporter.yml.j2
        mode: "0644"
    exec: --config.file=/etc/pve-exporter/pve-exporter.yml
    env:
      TZ: Europe/London

  grafana:
    enabled: true
    image: grafana/grafana
    # renovate: datasource=docker depName=grafana/grafana
    tag: 13.0.2
    port: 3000
    network: metrics
    uid: 472
    gid: 0
    volumes:
      - /opt/metrics01/grafana:/var/lib/grafana
      - /opt/metrics01/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    files:
      - dest: /opt/metrics01/grafana-provisioning/datasources/prometheus.yml
        template_src: grafana-datasources.yml.j2
    env:
      TZ: Europe/London
      GF_SERVER_ROOT_URL: "https://metrics.muffn.io"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Pocket ID"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "d1175001-f000-4d86-abd5-c09ccd352d86"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ grafana_pocketid_client_secret | trim }}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://id.muffn.io/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://id.muffn.io/api/oidc/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://id.muffn.io/api/oidc/userinfo"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://id.muffn.io/logout"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: >-
        contains(groups[*], 'grafana_admin') && 'Admin' ||
        contains(groups[*], 'grafana_viewer') && 'Viewer' || 'Viewer'
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"

