---
podman_enabled: true

podman_apps:
  gluetun:
    enabled: true
    image: ghcr.io/qdm12/gluetun
    # renovate: datasource=docker depName=ghcr.io/qdm12/gluetun
    tag: v3.41.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8888:8888"   # HTTP proxy
    volumes:
      - /opt/wgtun/gluetun:/gluetun
    env:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          65306462613630363461356361393162643839353639303937353664306361623365323733383831
          3838316438336137623732636237386234636337396536310a653631333532336431373163383436
          66393166653965616230653364633939336137326466396662613761306636386462613336323061
          3164326364376664310a616363326361636635653635613063336336663132656438386634613462
          30393262333731353438343934383731313362343362353134623536353234616139663866313538
          3537313664336330666266613832656364386533653164643330
      SERVER_COUNTRIES: Netherlands
      FIREWALL_OUTBOUND_SUBNETS: "10.83.0.0/16"
      HTTPPROXY: "on"
      HTTPPROXY_STEALTH: "on"
      DISABLE_IPV6: "on"
      FIREWALL_INPUT_PORTS: "8888"
