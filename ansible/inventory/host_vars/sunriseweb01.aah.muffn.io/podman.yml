---
podman_enabled: true

podman_networks:
  sunrise: {}

podman_apps:
  sunrise-db:
    enabled: true
    image: mariadb
    # renovate: datasource=docker depName=mariadb
    tag: "12.2.2"
    container_name: sunrise-db
    network: sunrise
    uid: 999
    gid: 999
    volumes:
      - /opt/sunriseweb/db:/var/lib/mysql
    env:
      TZ: Europe/London
      MYSQL_ROOT_PASSWORD: "{{ sunrise_mysql_root_password | trim }}"
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: "{{ sunrise_db_password | trim }}"

  sunrise:
    enabled: true
    image: wordpress
    # renovate: datasource=docker depName=wordpress
    tag: php8.2-apache
    container_name: sunrise
    port: 8080
    container_port: 80
    network: sunrise
    uid: 33
    gid: 33
    after:
      - sunrise-db.service
    requires:
      - sunrise-db.service
    volumes:
      - /opt/sunriseweb/html:/var/www/html
    env:
      TZ: Europe/London
      WORDPRESS_DB_HOST: sunrise-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: "{{ sunrise_db_password | trim }}"
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: >-
        define('WP_MEMORY_LIMIT', '256M'); define('WP_MAX_MEMORY_LIMIT', '256M');
        define('UPLOAD_MAX_FILESIZE', '64M'); define('POST_MAX_SIZE', '64M');
        define('MAX_EXECUTION_TIME', 300);

