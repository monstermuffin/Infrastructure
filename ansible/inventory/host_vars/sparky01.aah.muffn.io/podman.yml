---
podman_enabled: true

podman_networks:
  sparky: {}

podman_apps:
  sparky-db:
    enabled: true
    image: postgres
    # renovate: datasource=docker depName=postgres versioning=regex:^(?<major>18.4-alpine3.24)(\.(?<minor>\d+)(\.(?<patch>\d+))?)?(-.*)?$
    tag: "18.4-alpine3.24"
    container_name: sparky-db
    network: sparky
    uid: 999
    gid: 999
    volumes:
      - /opt/sparky/postgres:/var/lib/postgresql
    env:
      POSTGRES_DB: sparkyfitness
      POSTGRES_USER: sparky
      POSTGRES_PASSWORD: "{{ sparky_db_password | trim }}"
      TZ: Europe/London

  sparky-server:
    enabled: true
    image: codewithcj/sparkyfitness_server
    # renovate: datasource=docker depName=codewithcj/sparkyfitness_server
    tag: v0.16.6.3
    container_name: sparky-server
    network: sparky
    after:
      - sparky-db.service
    requires:
      - sparky-db.service
    volumes:
      - /opt/sparky/backup:/app/SparkyFitnessServer/backup
      - /opt/sparky/uploads:/app/SparkyFitnessServer/uploads
    env:
      NODE_ENV: production
      TZ: Europe/London
      SPARKY_FITNESS_DB_HOST: sparky-db
      SPARKY_FITNESS_DB_PORT: "5432"
      SPARKY_FITNESS_DB_NAME: sparkyfitness
      SPARKY_FITNESS_DB_USER: sparky
      SPARKY_FITNESS_DB_PASSWORD: "{{ sparky_db_password | trim }}"
      SPARKY_FITNESS_APP_DB_USER: sparkyapp
      SPARKY_FITNESS_APP_DB_PASSWORD: "{{ sparky_app_db_password | trim }}"
      SPARKY_FITNESS_API_ENCRYPTION_KEY: "{{ sparky_api_encryption_key | trim }}"
      BETTER_AUTH_SECRET: "{{ sparky_better_auth_secret | trim }}"
      SPARKY_FITNESS_FRONTEND_URL: https://{{ sparky_public_hostname }}
      SPARKY_FITNESS_DISABLE_EMAIL_LOGIN: "true"
      SPARKY_FITNESS_OIDC_AUTH_ENABLED: "true"
      SPARKY_FITNESS_OIDC_ISSUER_URL: https://id.muffn.io
      SPARKY_FITNESS_OIDC_CLIENT_ID: d8c01835-f86b-4c6d-85c3-a42b83b8069b
      SPARKY_FITNESS_OIDC_CLIENT_SECRET: "{{ sparky_oidc_client_secret | trim }}"
      SPARKY_FITNESS_OIDC_PROVIDER_SLUG: pocketid
      SPARKY_FITNESS_OIDC_AUTO_REGISTER: "true"
      SPARKY_FITNESS_OIDC_AUTO_REDIRECT: "true"
      # SPARKY_FITNESS_ADMIN_EMAIL: your-email@example.com

  sparky-frontend:
    enabled: true
    image: codewithcj/sparkyfitness
    # renovate: datasource=docker depName=codewithcj/sparkyfitness
    tag: v0.16.6.3
    container_name: sparky-frontend
    network: sparky
    port: 3004
    container_port: 80
    after:
      - sparky-server.service
    requires:
      - sparky-server.service
    env:
      SPARKY_FITNESS_FRONTEND_URL: https://{{ sparky_public_hostname }}
      SPARKY_FITNESS_SERVER_HOST: sparky-server
      SPARKY_FITNESS_SERVER_PORT: "3010"
      TZ: Europe/London

