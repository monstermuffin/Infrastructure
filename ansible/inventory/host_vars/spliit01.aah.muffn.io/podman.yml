      NEXTAUTH_SECRET: "{{ spliit_nextauth_secret | trim }}"
      NEXTAUTH_URL: "{{ spliit_public_base_url }}"
      NEXT_PUBLIC_ENABLE_EXPENSE_DOCUMENTS: "true"
      NEXT_PUBLIC_ENABLE_RECEIPT_EXTRACT: "false"
