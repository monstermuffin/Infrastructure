podman_apps:
  paperless-redis:
    enabled: true
    image: redis
    # renovate: datasource=docker depName=redis
    tag: "8"
    container_name: paperless-redis
    network: paperless
    uid: 999
    gid: 999
    volumes:
      - /opt/paperless/redis:/data

  paperless:
    enabled: true
    image: ghcr.io/paperless-ngx/paperless-ngx
    # renovate: datasource=docker depName=ghcr.io/paperless-ngx/paperless-ngx
    tag: 2.20.13
    port: 8084
    container_port: 8000
    uid: 993
    gid: 991
    network: paperless
    after:
      - paperless-redis.service
    requires:
      - paperless-redis.service
    volumes:
      - /opt/paperless/data:/usr/src/paperless/data
      - /opt/paperless/media:/usr/src/paperless/media
      - /opt/paperless/export:/usr/src/paperless/export
      - /opt/paperless/consume:/usr/src/paperless/consume
    env:
      USERMAP_UID: "993"
      USERMAP_GID: "991"
      TZ: Europe/London
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_SECRET_KEY: "{{ paperless_secret_key | trim }}"
      PAPERLESS_TIME_ZONE: Europe/London
      PAPERLESS_URL: https://paperless.jovion.io
      PAPERLESS_OCR_USER_ARGS: '{"continue_on_soft_render_error": true}'
      PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: >-
        {{
          {
            'openid_connect': {
              'APPS': [
                {
                  'provider_id': 'pocketid',
                  'name': 'Pocket ID',
                  'client_id': 'b5573dac-b5df-4151-a62f-b78de811fd47',
                  'secret': paperless_oidc_secret | trim,
                  'settings': {
                    'server_url': 'https://id.muffn.io/.well-known/openid-configuration'
                  }
                }
              ],
              'OAUTH_PKCE_ENABLED': 'True'
            }
          } | to_json
        }}
