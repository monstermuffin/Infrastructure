---
# Proxmox Global Vars

# Repo/APT/System config (post install)
pve_enterprise_repo_enabled: false
pve_no_subscription_repo_enabled: true
pve_test_repo_enabled: false

pve_ceph_repo_enabled: false
pve_ceph_repo_component: quincy

pve_remove_subscription_nag: true

pve_ha_services_enabled: true

pve_run_apt_update: true
pve_run_apt_upgrade: true

# Kernel management

pve_kernel_pin_version: ""
pve_kernel_pin_auto_reboot: false

# Kernel cleanup - removes old/unused kernel packages
# Actions: "list" (show only), "clean" (keep N versions), "clean-all" (remove all old)
pve_kernel_clean_action: "list"
pve_kernel_clean_keep_versions: 1
pve_kernel_clean_autoremove: true
pve_kernel_clean_update_grub: true

# Microcode

# Microcode action: "check" (status only), "install" (specific version), "latest" (auto-latest)
pve_microcode_action: "latest"
# Specific package to install (leave empty for auto-detect latest)
# Intel: "intel-microcode_3.20231114.1~deb12u1_amd64.deb"
# AMD: "amd64-microcode_3.20230808.1.1~deb12u1_amd64.deb"
pve_microcode_package: ""
pve_microcode_auto_reboot: false
# Override CPU vendor detection (should probably leave alone)
pve_microcode_vendor: ""

# CPU scaling governor

# Governor options: performance, powersave, ondemand, conservative, schedutil
pve_scaling_governor: ""
# Make governor persistent across reboots (crontab)
pve_scaling_governor_persistent: false
# Remove any existing governor persistence
pve_scaling_governor_remove_persistence: false

# System configuration

pve_system_hostname: ""  # host_vars
site_domain: ""  # group_vars

# Timezone
pve_system_timezone: "Europe/London"

# Locale
pve_system_locale: "en_US.UTF-8"
pve_system_locale_generate:
  - "en_US.UTF-8 UTF-8"

# SSH configuration
pve_system_ssh_permit_root_login: "prohibit-password"
pve_system_ssh_password_authentication: false
pve_system_ssh_port: 22

pve_system_ssh_import_keys_url: "https://github.com/monstermuffin.keys"

# MOTD
pve_system_motd_enabled: false
pve_system_motd_content: ""

